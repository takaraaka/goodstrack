<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="theme-color" content="#d85c80">
    <meta name="apple-mobile-web-app-status-bar-style" content="#d85c80">
    
    <title>谷子手帳 Goods Tracker</title>
    <style>
        :root {
            --primary-color: #d85c80;
            --primary-light: #fbebee;
            --bg-color: #faf6f7;
            --card-bg: #ffffff;
            --text-color: #4a3e41;
            --text-light: #8c7e81;
            --border-color: #f0e2e5;
            --accent-sb: #ffccd5;
            --status-pending: #ecebeb;
            --status-shipped: #fef1cf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        
        html, body {
            background-color: var(--bg-color);
        }

        /* 隱藏主網頁與彈窗的滾動條，但保留滑動功能 */
        html, body, .modal-content {
            -ms-overflow-style: none;  /* 適用於 IE / Edge */
            scrollbar-width: none;     /* 適用於 Firefox */
        }

        html::-webkit-scrollbar, 
        body::-webkit-scrollbar, 
        .modal-content::-webkit-scrollbar {
            display: none;             /* 適用於 Chrome, Safari, Web App (WebKit) */
        }
        

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 100px; /* Space for the persistent bottom bar */
            font-size: 14px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            /* 💡 3個數值代表：上 (10px) | 左右 (16px) | 下 (16px 保持不變) */
            padding: 10px 16px 16px; 
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        @media (min-width: 768px) {
            header {
                padding: 16px; /* 還原成網頁版原本上下左右對稱的 16px 厚度，大氣又好睇！ */
            }
        }

        .container {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 3-Block Summary Dashboard */
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            background: #fafafa;
            padding: 8px 4px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #fdfdfd;
            min-width: 0;
        }

        .stat-item.highlight-stat {
            background: #fff0f3;
            border-color: #ffe3e8;
        }

        .stat-item .value {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-item .label {
            font-size: 11px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Exchange Rate & IP Manager Panel */
        .rate-setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 11px;
            color: var(--text-light);
            background: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            transition: all 0.3s ease;
        }

        .rate-setting.settings-active {
            justify-content: center;
        }

        .rate-setting input[type="number"] {
            width: 50px;
            padding: 2px 4px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
        }

        .system-settings-toggle {
            display: inline-block;
            margin-top: 0;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hide-rate {
            display: none !important;
        }

        .system-settings-panel {
            display: none;
            margin-bottom: 12px;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            text-align: left;
        }

        .system-settings-panel.active {
            display: block;
        }

        /* 專屬微調：將系統設定面板內的修改和刪除按鈕字體同時變細統一 */
        .system-settings-panel .action-btn.edit,
        .system-settings-panel .action-btn.delete {
            font-size: 9px !important;
            font-weight: bold;
        }

        .settings-section-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 6px;
            margin-top: 10px;
            padding-left: 2px;
        }

        .settings-section-title:first-of-type {
            margin-top: 0;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdfafb;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .settings-add-form {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 12px;
        }

        .settings-add-form input[type="text"] {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
        }

        .settings-add-form input[type="color"] {
            border: none;
            width: 28px;
            height: 28px;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        /* 自訂正方形小Icon上傳按鈕外框 */
        .custom-icon-upload-wrapper {
            border: 1px dashed var(--primary-color);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #fff;
            overflow: hidden;
            position: relative;
        }

        .custom-icon-upload-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .custom-icon-upload-wrapper span {
            font-size: 12px;
        }

        .settings-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 系統設定中 IP 與平台 Icon 的清除按鈕 */
        .icon-clear-btn {
            font-size: 10px;
            font-weight: bold;
            color: #e24a4a;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
            display: none;
        }

        /* Dual-row Filters */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .filter-row-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .filter-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            flex: 1;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .filter-row-label {
            font-size: 10px;
            color: var(--text-light);
            font-weight: bold;
            margin-bottom: 2px;
            padding-left: 4px;
        }

        .filter-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }

        /* 僅保留給非狀態區的通用過濾按鈕選中效果 */
        :not(#status-filters) > .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 🎯 小紅書風狀態 Tab 欄容器 */
        #status-filters {
            border-bottom: 1px solid var(--border-color); /* 保留很淡的底線分割線 */
            padding-bottom: 0px;
            margin-bottom: 8px;
            background: transparent; /* 💡 改成透明，直接透出你原本手帳的粉嫩底色 */
            padding: 8px 4px 0px 4px;
        }
        
        /* 🎯 小紅書風狀態 Tab 按鈕（預設：未 active） */
        #status-filters .filter-btn {
            background: transparent !important;
            border: none !important;
            border-radius: 0 !important;
            padding: 8px 12px 10px 12px !important;
            font-size: 12px; /* 字體稍微優化 */
            color: var(--text-light) !important; /* 未選中時文字顏色變淡 */
            font-weight: normal !important;
            position: relative;
            transition: all 0.15s ease;
        }
        
        /* 🎯 小紅書風狀態 Tab 按鈕（Active 狀態：Highlight + Bold + 紅色底線） */
        #status-filters .filter-btn.active {
            background: transparent !important; /* 確保不被主色覆蓋背景 */
            color: var(--text-color) !important; /* 選中時文字變深色 */
            font-weight: bold !important;        /* 💡 Highlight 粗體 */
        }
        
        /* 💡 使用偽元素繪製精緻的紅色短底線 */
        #status-filters .filter-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15%;  /* 讓底線縮短一點，置中貼合字體 */
            width: 70%;
            height: 3px; /* 底線厚度 */
            background-color: var(--primary-color); /* 使用你的主色粉紅/紅色 */
            border-radius: 2px;
        }

        /* 🎯 讓整個 IP 分類欄支援圓形排版 */
#ip-filters {
    display: flex;
    gap: 12px; /* 圓形按鈕之間留點舒服的空隙 */
    padding: 4px 8px;
    align-items: flex-start;
}

/* 🎯 將 IP 按鈕徹底改造成「圓形大金剛」 */
#ip-filters .filter-btn {
    display: inline-flex;
    flex-direction: column; /* 💡 關鍵：改為垂直排列（上圖下字） */
    align-items: center;
    justify-content: center;
    background: transparent !important; /* 攞走原本的白底膠囊框 */
    border: none !important;
    padding: 0 !important;
    margin: 0 !important;
    width: 64px;  /* 固定寬度，方便對齊 */
    min-width: 64px;
    cursor: pointer;
    color: var(--text-light) !important;
}

/* 🎯 選中（Active）時的效果：字體變深色 */
#ip-filters .filter-btn.active {
    color: var(--text-color) !important;
}

/* 🎯 外層圓形容器（無論有冇圖，都維持一個漂亮圓圈） */
#ip-filters .ip-circle-wrapper {
    width: 46px;   /* 圓圈大小 */
    height: 46px;
    border-radius: 50%; /* 💡 徹底變成正圓形 */
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px; /* 與下方細字的距離 */
    font-size: 11px;
    font-weight: bold;
    overflow: hidden; /* 確保圖片如果填滿時，超出的地方會被圓形裁剪 */
    border: 1px solid var(--border-color);
    transition: all 0.2s ease;
}

/* 🎯 當選中（Active）時，圓圈加粗框線以示區別 */
#ip-filters .filter-btn.active .ip-circle-wrapper {
    border: 2.5px solid var(--primary-color) !important;
    transform: scale(1.05); /* 輕微放大，更有動態感 */
}

/* 🎯 圓圈內的圖片設定（1:1 還原你的要求） */
#ip-filters .ip-circle-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 💡 得 Icon 時，成張圖完美填滿個圓形 */
}

/* 🎯 下方的超細名字 */
#ip-filters .ip-circle-text {
    font-size: 10px; /* 💡 字勁細 */
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
}

/* 🎯 選中時文字變粗 */
#ip-filters .filter-btn.active .ip-circle-text {
    font-weight: bold;
}

      
        /* Sorting Select Styling */
        .sort-select {
            background: var(--primary-light);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            outline: none;
            margin-bottom: 4px;
            margin-left: 8px;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
        }

        .sort-btn:active {
            transform: scale(0.95);
        }

        /* Card List */
        .goods-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .goods-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .goods-card.card-completed {
            background-color: #f1f1f1 !important;
            border-color: #e0e0e0;
        }

        .goods-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ip-badges-wrapper {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .ip-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Card 內自訂小正方形圖片圖標樣式 */
        .square-badge-icon {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.4);
            display: inline-block;
        }

        /* 卡片平台標籤樣式 */
        .platform-tag {
            background: #e9ecef;

            padding: 2px 6px;
            border-radius: 4px;

        .platform-tag-icon {

        .status-select-btn {

        .status-select-btn:active {

        .status-pending {

        }

        .status-shipped {
            background-color: #fff3cd;

        }

        .status-arrived {

        }

        .status-completed {

        }

        .goods-body {
            display: flex;
            gap: 12px;
        }

        .goods-pic {

        }

        .goods-pic img {

        }

        .goods-pic span {

        }

        .goods-details {
            flex: 1;

            justify-content: space-between;

        }

        .goods-title {
            font-size: 14px;

        }

        .goods-meta {
            font-size: 11px;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;

        }

        .meta-item {
            background: #f7f3f4;

        }

        .goods-financials {
            display: flex;
            flex-direction: column;
            gap: 4px;

        }

        .financial-row {

        }

        .price-tag {

        }

        .balance-tag {

        }

        .total-cost-tag {

        }

        .action-btn.edit {

        }

        .action-btn.delete {
            color: #e24a4a;
        }

        /* 1. 優化底部底欄：精確視覺對稱排版 */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            box-shadow: 0 -3px 15px rgba(0,0,0,0.05);
            
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            align-items: center;
            
            /* 💡 將原本死數的 height: 60px 改成 min-height，容納彈性留白 */
            min-height: 60px; 
            z-index: 9999;
            padding: 0; 

            /* 🎯 關鍵修正：當 safe-area 為 0 時，強制最少都要有 10px 嘅保底留白 */
            padding-bottom: max(10px, env(safe-area-inset-bottom)); 
        }

        /* 💡 關鍵 2：使用 dvw (螢幕寬度單位)，確保在所有手機上比例完美一致 */
        .bottom-bar > *:nth-child(1) {
            justify-self: start;       /* 靠左對齊 */
            padding-left: 15dvw;       /* 💡 佔螢幕寬度的 15%，自動適應所有手機 */
        }

        .bottom-bar > *:nth-child(2) {
            justify-self: center;      /* 「加號」穩居絕對正中間 */
        }

        .bottom-bar > *:nth-child(3) {
            justify-self: end;         /* 靠右對齊 */
            padding-right: 15dvw;      /* 💡 佔螢幕寬度的 15%，與左邊絕對對稱 */
        }

        .bottom-bar span {
            margin-top: 0 !important;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        

        /* 2. 重塑加號按鈕：收埋入去平排，唔再凸出黎 */
        .add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(216, 92, 128, 0.3);
            transition: transform 0.2s;
        }

        /* 💡 新增：控制 SVG 十字的大小 */
        .add-btn svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .add-btn:active {
            transform: scale(0.92);
        }

        /* Lightbox Preview */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox-overlay.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            object-fit: contain;
        }

        /* Modal styling */
        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            animation: fadeInBg 0.2s ease-out forwards;
        }

        .modal-content {
            background-color: var(--card-bg);

    <script>
        const defaultIpSettings = [
            { id: "IP1", name: "IP1", color: "#ffe3e8", textColor: "#d85c80", pic: "" },
            { id: "IP2", name: "IP2", color: "#e3f0ff", textColor: "#3b7ec4", pic: "" },
            { id: "IP3", name: "IP3", color: "#fef1cf", textColor: "#9e7715", pic: "" },
            { id: "OTHERS", name: "其他", color: "#ecebeb", textColor: "#5c5556", pic: "" }
        ];

        const defaultPlatformSettings = [
            { id: "淘寶", name: "淘寶", pic: "" },
            { id: "閒魚", name: "閒魚", pic: "" },
            { id: "小紅書", name: "小紅書", pic: "" },
            { id: "官網", name: "官網", pic: "" },
            { id: "拼團", name: "拼團", pic: "" },
            { id: "其他", name: "其他", pic: "" }
        ];

        const defaultData = [
            { item: "Item 1", ip: ["IP1"], status: "待發貨", date: "2026-06-01", arrived: "2026年7月", paid: 100, currency: "HKD", balance: 180, fullpaid: false, platform: "小紅書", pic: "", remarks: "" }
        ];

        let goodsList;
        let globalRate;
        let ipSettings;
        let platformSettings;
        let headerTitle;
        let currentSortMode;
        try {
            goodsList = JSON.parse(localStorage.getItem('goodsTrackerData')) || defaultData;
            globalRate = parseFloat(localStorage.getItem('goodsTrackerRate')) || 1.16;
            ipSettings = JSON.parse(localStorage.getItem('goodsTrackerIpSettings')) || defaultIpSettings;
            
            let savedPlats = localStorage.getItem('goodsTrackerPlatformSettings');
            if (savedPlats) {
                let parsed = JSON.parse(savedPlats);
                if (parsed.length > 0 && typeof parsed[0] === 'string') {
                    platformSettings = parsed.map(p => ({ id: p, name: p, pic: "" }));
                } else {
                    platformSettings = parsed;
                }
            } else {
                platformSettings = defaultPlatformSettings;
            }

            headerTitle = localStorage.getItem('goodsTrackerHeaderTitle') || "🍡 谷子手帳 Goods Tracker";
            currentSortMode = localStorage.getItem('goodsTrackerSortMode') || 'arrived_desc'; 
        } catch (e) {
            goodsList = defaultData; globalRate = 1.16; ipSettings = defaultIpSettings; platformSettings = defaultPlatformSettings; headerTitle = "🍡 谷子手帳 Goods Tracker"; currentSortMode = 'arrived_desc';
        }

        // 統一在此處處理歷史數據升級轉名
        goodsList.forEach(item => {
            if (item.status === '已出貨' || item.status === '出貨') item.status = '待收貨';
            if (item.status === '已到貨' || item.status === '到貨') item.status = '已到貨';
            if (item.status === '待出貨') item.status = '待發貨';
            if (typeof item.ip === 'string') item.ip = [item.ip];
            if (!item.ip) item.ip = ["OTHERS"];
        });

        let selectedFormIPs = [];
        let currentStatusFilter = 'all'; 
        let currentIPFilter = 'all';

        document.getElementById('global-rate').value = globalRate.toFixed(2);

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('main-header').innerText = headerTitle;
            document.getElementById('custom-header-title').value = headerTitle;

            const sortSelect = document.getElementById('sort-select');
            if (sortSelect) sortSelect.value = currentSortMode;

            renderSettingsManager();
            render(); // 拔除衝突的 renderFilters()，由龍頭 render() 一步繪製到位
        });

        function updateGlobalRate() {
            const inputVal = parseFloat(document.getElementById('global-rate').value);
            if (!isNaN(inputVal) && inputVal > 0) {
                globalRate = inputVal;
                try { localStorage.setItem('goodsTrackerRate', globalRate); } catch(e){}
                calculateConvertedPrice(); render();
            }
        }

        function updateHeaderTitle() {
            const newTitle = document.getElementById('custom-header-title').value.trim();
            if (!newTitle) return alert('請輸入手帳標題！');
            headerTitle = newTitle;
            document.getElementById('main-header').innerText = headerTitle;
            try { localStorage.setItem('goodsTrackerHeaderTitle', headerTitle); alert('手帳標題已成功儲存！'); } catch(e){}
        }

        function toggleSystemSettings() {
            const panel = document.getElementById('system-settings-panel');
            const rateContainer = document.getElementById('rate-container');
            const rateWrapper = document.getElementById('rate-setting-wrapper');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                rateContainer.classList.add('hide-rate');
                rateWrapper.classList.add('settings-active');
            } else {
                rateContainer.classList.remove('hide-rate');
                rateWrapper.classList.remove('settings-active');
            }
        }

        function getContrastYIQ(hexcolor){
            hexcolor = hexcolor.replace("#", "");
            var r = parseInt(hexcolor.substr(0,2),16), g = parseInt(hexcolor.substr(2,2),16), b = parseInt(hexcolor.substr(4,2),16);
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? '#4a3e41' : '#ffffff';
        }

        function compressImage(base64Str, maxWidth = 500, quality = 0.7) {
            return new Promise((resolve) => {
                if (!base64Str || !base64Str.startsWith('data:image')) {
                    resolve(base64Str);
                    return;
                }
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                    resolve(compressedBase64);
                };
                img.onerror = function() { resolve(base64Str); };
                img.src = base64Str;
            });
        }

        function handleIpIconUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                compressImage(e.target.result, 100, 0.7).then(compressed => {
                    document.getElementById('new-ip-pic').value = compressed;
                    document.getElementById('new-ip-icon-preview').src = compressed;
                    document.getElementById('new-ip-icon-preview').style.display = 'block';
                    document.getElementById('new-ip-icon-placeholder').style.display = 'none';
                    document.getElementById('ip-icon-clear-btn').style.display = 'inline-block';
                });
            };
            reader.readAsDataURL(file);
        }

        function clearIpIconUpload() {
            document.getElementById('new-ip-pic').value = '';
            document.getElementById('new-ip-file').value = '';
            document.getElementById('new-ip-icon-preview').style.display = 'none';
            document.getElementById('new-ip-icon-placeholder').style.display = 'block';
            document.getElementById('ip-icon-clear-btn').style.display = 'none';
        }

        function handlePlatformIconUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                compressImage(e.target.result, 100, 0.7).then(compressed => {
                    document.getElementById('new-platform-pic').value = compressed;
                    document.getElementById('new-platform-icon-preview').src = compressed;
                    document.getElementById('new-platform-icon-preview').style.display = 'block';
                    document.getElementById('new-platform-icon-placeholder').style.display = 'none';
                    document.getElementById('platform-icon-clear-btn').style.display = 'inline-block';
                });
            };
            reader.readAsDataURL(file);
        }

        function clearPlatformIconUpload() {
            document.getElementById('new-platform-pic').value = '';
            document.getElementById('new-platform-file').value = '';
            document.getElementById('new-platform-icon-preview').style.display = 'none';

        function addNewIp() {
            const editId = document.getElementById('edit-ip-id').value;
            const nameInput = document.getElementById('new-ip-name');
            const colorInput = document.getElementById('new-ip-color');
            const picInput = document.getElementById('new-ip-pic');
            const name = nameInput.value.trim(); const color = colorInput.value; const pic = picInput.value;

            if (!name && !pic) return alert('請輸入 IP 名稱或上傳圖標！');

            if (editId) {
                const ip = ipSettings.find(item => item.id === editId);
                if (ip) {
                    const oldId = ip.id;
                    const newId = name ? name.toUpperCase().replace(/\s+/g, '_') : 'IP_' + Date.now();
                    goodsList.forEach(item => {
                        if (Array.isArray(item.ip)) {
                            item.ip = item.ip.map(val => val === oldId ? newId : val);
                        }
                    });
                    ip.id = newId; ip.name = name; ip.color = color; ip.textColor = getContrastYIQ(color); ip.pic = pic;
                    if (currentIPFilter === oldId) currentIPFilter = newId;
                }
                document.getElementById('edit-ip-id').value = '';
                document.getElementById('ip-submit-btn').innerText = '＋新增 IP';
            } else {
                const id = name ? name.toUpperCase().replace(/\s+/g, '_') : 'IP_' + Date.now();
                if (ipSettings.some(ip => ip.id === id)) return alert('該 IP 已存在！');
                ipSettings.push({ id, name, color, textColor: getContrastYIQ(color), pic });
            }

            try { localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings)); } catch(e){}
            nameInput.value = ''; clearIpIconUpload(); saveData(); renderSettingsManager();
        }

        function updateIpColor(id, newColor) {
            const ip = ipSettings.find(item => item.id === id);
            if (ip) {
                ip.color = newColor; ip.textColor = getContrastYIQ(newColor);
                try { localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings)); } catch(e){}
                renderSettingsManager(); render();
            }
        }

        function deleteIp(id) {
            if (id === 'OTHERS') return;
            if (confirm(`確定要刪除 IP 嗎？相關物品會自動歸類到「其他」。`)) {
                goodsList.forEach(item => { if (Array.isArray(item.ip)) item.ip = item.ip.map(val => val === id ? 'OTHERS' : val); });
                ipSettings = ipSettings.filter(ip => ip.id !== id);
                if (currentIPFilter === id) currentIPFilter = 'all';
                try { localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings)); } catch(e){}
                saveData(); renderSettingsManager();
            }
        }

        function addNewPlatform() {
            const editId = document.getElementById('edit-platform-id').value;
            const input = document.getElementById('new-platform-name');
            const picInput = document.getElementById('new-platform-pic');
            const name = input.value.trim(); const pic = picInput.value;

            if (!name && !pic) return alert('請輸入平台名稱或上傳圖標！');

            if (editId) {
                const plat = platformSettings.find(item => item.id === editId);
                if (plat) {
                    const oldId = plat.id;
                    const newId = name ? name : 'PLAT_' + Date.now();
                    goodsList.forEach(item => { if (item.platform === oldId) item.platform = newId; });
                    plat.id = newId; plat.name = name; plat.pic = pic;
                }
                document.getElementById('edit-platform-id').value = '';
                document.getElementById('platform-submit-btn').innerText = '＋新增平台';
            } else {
                const id = name ? name : 'PLAT_' + Date.now();
                if (platformSettings.some(p => p.id === id)) return alert('該平台已存在！');
                const newPlat = { id, name, pic };
                const otherIdx = platformSettings.findIndex(p => p.id === '其他');
                if (otherIdx > -1) platformSettings.splice(otherIdx, 0, newPlat);
                else platformSettings.push(newPlat);
            }

            try { localStorage.setItem('goodsTrackerPlatformSettings', JSON.stringify(platformSettings)); } catch(e){}
            input.value = ''; clearPlatformIconUpload(); saveData(); renderSettingsManager();
        }

        function deletePlatform(id) {
            if (id === '其他') return;
            if (confirm(`確定要刪除平台嗎？相關物品會自動轉為「其他」。`)) {
                goodsList.forEach(item => { if (item.platform === id) item.platform = '其他'; });
                platformSettings = platformSettings.filter(p => p.id !== id);
                try { localStorage.setItem('goodsTrackerPlatformSettings', JSON.stringify(platformSettings)); } catch(e){}
                saveData(); renderSettingsManager();

        }

        function toggleStatus(index, event) {
            if (event) event.stopPropagation();
            const item = goodsList[index];
            if (item.status === '待發貨') item.status = '待收貨';
            else if (item.status === '待收貨') item.status = '已到貨';
            else if (item.status === '已到貨') item.status = '完成';
            else item.status = '待發貨';
            saveData();
        }

        function saveData() {
            try { 
                localStorage.setItem('goodsTrackerData', JSON.stringify(goodsList)); 
            } catch(e) {
                alert('⚠️ 手機暫存空間已爆滿！儲存失敗。');
            }
            render();
        }

        function changeSortMode(value) {
            currentSortMode = value;
            try { localStorage.setItem('goodsTrackerSortMode', currentSortMode); } catch(e){}
            render();
        }

        function parseArrivalDate(str) {
            if (!str) return null;
            let matches = str.match(/\d+/g); if (!matches) return null;
            let year = 2026, month = 1;
            if (matches.length === 1) month = parseInt(matches[0]);
            else if (matches.length >= 2) { year = parseInt(matches[0]); if (year < 100) year += 2000; month = parseInt(matches[1]); }
            return new Date(year, month - 1, 1).getTime();
        }

        function openLightbox(picSrc, event) {
            if (event) event.stopPropagation();
            if (!picSrc || (!picSrc.startsWith('http') && !picSrc.startsWith('data:image'))) return;
            document.getElementById('lightbox-img').src = picSrc;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

        function calculateConvertedPrice() {
            const amount = parseFloat(document.getElementById('form-paid').value) || 0;
            const currency = document.getElementById('form-currency').value;
            const balAmount = parseFloat(document.getElementById('form-balance').value) || 0;
            const balCurrency = document.getElementById('form-balance-currency').value;
            const preview = document.getElementById('conversion-preview');
            let parts = [];
            if (amount > 0) parts.push(currency === 'RMB' ? `已付: ¥${amount} (折合 $${(amount * globalRate).toFixed(2)} HKD)` : `已付: $${amount} HKD`);
            if (balAmount > 0) parts.push(balCurrency === 'RMB' ? `尾款: ¥${balAmount} (折合 $${(balAmount * globalRate).toFixed(2)} HKD)` : `尾款: $${balAmount} HKD`);
            preview.innerHTML = parts.length > 0 ? `💡 預覽折算：` + parts.join(' | ') : '';
        }

        function handleImageUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                compressImage(e.target.result, 500, 0.7).then(compressed => {
                    document.getElementById('form-pic').value = compressed;
                    document.getElementById('pic-preview').innerHTML = `<img src="${compressed}">`;
                });
            };
            reader.readAsDataURL(file);
        }

        function clearUploadedImage() {
            document.getElementById('form-pic').value = ''; document.getElementById('form-file').value = '';
            document.getElementById('pic-preview').innerHTML = `<span style="font-size:10px; color:var(--text-light);">📸 無圖</span>`;
        }

        function calculateStats() {
            let imminent = 0, pending = 0, balTotalRMB = 0;
            const now = new Date(); const currentTimestamp = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            goodsList.forEach(item => {
                if (item.status !== '完成') { 
                    pending++; 
                    let arrTime = parseArrivalDate(item.arrived); 
                    if (arrTime !== null && arrTime <= currentTimestamp) imminent++; 
                }
                const balInRMB = (item.balanceCurrency || 'RMB') === 'RMB' ? Number(item.balance || 0) : (Number(item.balance || 0) / globalRate);
                balTotalRMB += balInRMB;
            });
            document.getElementById('imminent-count').innerText = imminent + " 件";
            document.getElementById('pending-count').innerText = pending + " 件";
            document.getElementById('total-balance').innerText = `¥${Math.round(balTotalRMB)}`;
        }

        function render() {
            // ================= 1. 即時重新計算所有新狀態與 IP 的數據計數 =================
            let totalAll = goodsList.length;
            let statusCounts = { '待發貨': 0, '待收貨': 0, '已到貨': 0, '完成': 0 };
            
            let ipCounts = {};
            ipSettings.forEach(ip => ipCounts[ip.id] = 0);
            ipCounts['OTHERS'] = 0;

            goodsList.forEach(item => {
                if (statusCounts.hasOwnProperty(item.status)) statusCounts[item.status]++;
                
                // IP 計數連動當前狀態
                let matchStatus = currentStatusFilter === 'all' ? true : item.status === currentStatusFilter;
                if (matchStatus) {
                    const itemIps = Array.isArray(item.ip) ? item.ip : [item.ip || 'OTHERS'];
                    itemIps.forEach(ipId => {
                        if (ipCounts.hasOwnProperty(ipId)) ipCounts[ipId]++;
                        else ipCounts['OTHERS']++;
                    });
                }
            });

            // ================= 2. 渲染小紅書風格狀態 Tab Filters =================
            const statusContainer = document.getElementById('status-filters');
            let statusHTML = '';
            
            // 全部 永遠顯示
            statusHTML += `<button class="filter-btn ${currentStatusFilter === 'all' ? 'active' : ''}" onclick="filterStatus('all', event)">全部 (${totalAll})</button>`;
            
            // 四個精簡化新狀態動態渲染（永遠顯示，但隱藏 0 的數字）
            ['待發貨', '待收貨', '已到貨', '完成'].forEach(st => {
                let c = statusCounts[st] || 0;
                // 💡 關鍵改動：如果數量大於 0 就顯示 (X)，如果是 0 就變成空文字
                let countDisplay = c > 0 ? ` (${c})` : ''; 
                
                // 攞走咗原先 count > 0 才顯示的 if 限制，讓按鈕永遠留低
                statusHTML += `<button class="filter-btn ${currentStatusFilter === st ? 'active' : ''}" onclick="filterStatus('${st}', event)">${st}${countDisplay}</button>`;
            });
          
            statusContainer.innerHTML = statusHTML;

            // ================= 3. 渲染 IP Filters (全新圓形金剛位版 - 隱藏下方重疊 Emoji) =================
            const filterContainer = document.getElementById('ip-filters');
            let currentStatusTotal = currentStatusFilter === 'all' ? totalAll : (statusCounts[currentStatusFilter] || 0);
                    
            // 1. 先做「全部」按鈕 (維持不變)
            let ipHTML = `
                <button class="filter-btn ${currentIPFilter === 'all' ? 'active' : ''}" onclick="filterIP('all', event)">
                    <div class="ip-circle-wrapper" style="background-color: var(--primary-light); color: var(--primary-color); border-color: var(--primary-color);">✨</div>
                    <div class="ip-circle-text">全部(${currentStatusTotal})</div>
                </button>
            `;
            
            // 2. 循環渲染各個 IP
            ipSettings.forEach(ip => {
                let count = ipCounts[ip.id] || 0;
                if (count > 0 || currentIPFilter === ip.id) {
                    const countDisplay = count > 0 ? `(${count})` : '';
                    let innerContent = '';
                    let wrapperStyle = `background-color: ${ip.color}; color: ${ip.textColor || getContrastYIQ(ip.color)};`;
                    
                    // 💡 新增：預設下面顯示的文字就是原本的名稱
                    let displayName = ip.name || ''; 

                    // 💡 終極修正：使用現代 JavaScript 萬能天網，只要是 Emoji（不論是圖案還是符號心心）通通精準捕捉！
                    const emojiMatch = ip.name ? ip.name.match(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}]/u) : null;

                    if (ip.pic) {
                        innerContent = `<img src="${ip.pic}">`;
                        // 💡 如果有相片，而名字開頭又有寫 Emoji，順便幫你把下方的 Emoji 也切走，維持純文字最漂亮
                        if (emojiMatch) {
                            displayName = ip.name.replace(emojiMatch[0], '').trim();
                        }
                    } else {
                        if (emojiMatch) {
                            innerContent = emojiMatch[0]; // 圓圈內放開頭的 Emoji
                            // 🎯 關鍵修正：下方的細字，把匹配到的第一個 Emoji 直接「刪除」，只留後面的名字！
                            displayName = ip.name.replace(emojiMatch[0], '').trim(); 
                        } else {
                            innerContent = ip.name ? ip.name.charAt(0) : '谷'; // 否則維持抓第一個字
                        }
                    }

                    ipHTML += `
                        <button class="filter-btn ${currentIPFilter === ip.id ? 'active' : ''}" onclick="filterIP('${ip.id}', event)">
                            <div class="ip-circle-wrapper" style="${wrapperStyle}">${innerContent}</div>
                            <!-- 💡 這裡改用處理過的 displayName 輸出，就不會再重疊顯示 Emoji 喇 -->
                            <div class="ip-circle-text">${displayName}${countDisplay}</div>
                        </button>
                    `;
                }
            });
            filterContainer.innerHTML = ipHTML;

            // ================= 4. 列表數據篩選與卡片渲染 =================
            calculateStats();
            const container = document.getElementById('goods-container'); 
            container.innerHTML = '';
            
            let filteredList = goodsList.filter(item => {
                let statusMatch = currentStatusFilter === 'all' ? true : item.status === currentStatusFilter;
                let ipMatch = currentIPFilter === 'all' ? true : (Array.isArray(item.ip) ? item.ip.includes(currentIPFilter) : item.ip === currentIPFilter);
                return statusMatch && ipMatch;
            });

            filteredList.sort((a, b) => {
                if (currentSortMode.startsWith('arrived')) {
                    let tA = parseArrivalDate(a.arrived), tB = parseArrivalDate(b.arrived);
                    if (tA === null) return 1; if (tB === null) return -1;
                    return currentSortMode === 'arrived_desc' ? tA - tB : tB - tA;
                } else {
                    let dA = a.date ? new Date(a.date).getTime() : 0, dB = b.date ? new Date(b.date).getTime() : 0;
                    return currentSortMode === 'order_desc' ? dB - dA : dA - dB;
                }
            });

            if (filteredList.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-light);">暫時無相關記錄，撳下方 "+" 加一件啦！</div>`; return;
            }

            filteredList.forEach((item) => {
                const actualIndex = goodsList.indexOf(item); const card = document.createElement('div');
                card.className = item.status === '完成' ? 'goods-card card-completed' : 'goods-card';

                let statusClass = 'status-pending'; // 待發貨用灰色
                if (item.status === '待收貨') statusClass = 'status-shipped'; 
                if (item.status === '已到貨') statusClass = 'status-arrived'; 
                if (item.status === '完成') statusClass = 'status-completed'; 
                
                const isRMB = item.currency === 'RMB';
                const originalPaidDisplay = `${isRMB ? '¥' : '$'}${Number(item.paid || 0).toFixed(2)}`;
                const totalCostHKD = (isRMB ? (item.paid * globalRate) : item.paid) + ((item.balanceCurrency || 'RMB') === 'RMB' ? ((item.balance || 0) * globalRate) : (item.balance || 0));

                let ipBadgesHTML = '';
                const itemIps = Array.isArray(item.ip) ? item.ip : [item.ip || 'OTHERS'];
                itemIps.forEach(val => {
                    const ipSetting = ipSettings.find(ip => ip.id === val) || { name: val === 'OTHERS' ? '其他' : val, color: '#ecebeb', textColor: '#5c5556', pic: "" };
                    const iconTag = ipSetting.pic ? `<img src="${ipSetting.pic}" class="square-badge-icon">` : '';
                    ipBadgesHTML += `<span class="ip-badge" style="background-color: ${ipSetting.color}; color: ${ipSetting.textColor || getContrastYIQ(ipSetting.color)}">${iconTag}${ipSetting.name}</span> `;
                });

                const platSetting = platformSettings.find(p => p.id === item.platform);
                const platIconHTML = (platSetting && platSetting.pic) ? `<img src="${platSetting.pic}" class="platform-tag-icon">` : '🛒 ';
                const platNameDisplay = (platSetting && platSetting.name) ? platSetting.name : (item.platform || '其他');

                const isRealImage = item.pic && (item.pic.startsWith('http') || item.pic.startsWith('data:image'));

                card.innerHTML = `
                    <div class="goods-header">
                        <div class="ip-badges-wrapper">${ipBadgesHTML}</div>
                        <span class="status-select-btn ${statusClass}" onclick="toggleStatus(${actualIndex}, event)">${item.status} 🔄</span>
                    </div>
                    <div class="goods-body">
                        <div class="goods-pic" onclick="${isRealImage ? `openLightbox('${item.pic}', event)` : ''}">
                            ${isRealImage ? `<img src="${item.pic}">` : `<span>${item.pic || '📸 暫無相片'}</span>`}
                        </div>
                        <div class="goods-details">
                            <div class="goods-title">${item.item}</div>
                            <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px; margin-bottom: 4px; font-size: 12px;">
                                <span class="platform-tag">${platIconHTML}${platNameDisplay}</span>
                                <span style="color: var(--text-light); font-size: 11px;">HKD <span class="total-cost-tag">${totalCostHKD.toFixed(2)}</span></span>
                            </div>
                            <div class="goods-meta" style="display: flex; flex-direction: column; gap: 4px;">
                                <span class="meta-item" style="font-size: 11px; font-weight: bold; color: var(--text-color);">
                                    📦 ${item.arrived || '未註明'} 到貨
                                </span>
                                <span class="meta-item" style="font-size: 9px; color: var(--text-light); background: transparent; padding-left: 7.5px;">
                                    📅&nbsp;&nbsp;${item.date || '無日期'} 下單
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="goods-financials">
                        <div class="financial-row">
                            <div>已付: <span class="price-tag">${originalPaidDisplay}</span></div>
                            <div>尾款: ${item.balance ? `<span class="balance-tag">${((item.balanceCurrency || 'RMB') === 'RMB' ? '¥' : '$') + item.balance}</span>` : `<span style="color:var(--text-light);">無</span>`}</div>
                            <div>${item.balance > 0 && !item.fullpaid ? '<span style="color:#e56b3f; font-weight:bold;">⏳ 待補款</span>' : '<span style="color:#55a630; font-weight:bold;">✅ 已付款</span>'}</div>
                        </div>
                    </div>
                    ${item.remarks ? `<div class="remarks-section">📝 ${item.remarks}</div>` : ''}
                    <div class="card-actions">
                        <button type="button" class="action-btn duplicate" onclick="duplicateGoods(${actualIndex})" style="color:#6c757d;">複製</button>
                        <button type="button" class="action-btn edit" onclick="editGoods(${actualIndex})">修改</button>
                        <button type="button" class="action-btn delete" onclick="deleteGoods(${actualIndex})">刪除</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function filterStatus(status, event) {
            currentStatusFilter = status;
            render(); 
        }

        function filterIP(ip, event) {
            currentIPFilter = ip;
            render(); 
        }

        function openModal(action, index = null) {
            const modal = document.getElementById('goods-modal'); 
            document.getElementById('goods-form').reset();
            clearUploadedImage(); 
            document.getElementById('conversion-preview').innerText = '';
            renderFormIpTags(); 
            renderFormPlatforms();

            if (action === 'edit' && index !== null) {
                document.getElementById('modal-action-title').innerText = '修改谷子記錄';
                const item = goodsList[index]; document.getElementById('edit-index').value = index;
                document.getElementById('form-item').value = item.item;
                selectedFormIPs = Array.isArray(item.ip) ? [...item.ip] : [item.ip || 'OTHERS'];
                updateFormIPClasses(); document.getElementById('form-status').value = item.status;
                document.getElementById('form-date').value = item.date;

                let yVal = '', mVal = '';
                if (item.arrived) {
                    const yM = item.arrived.match(/(\d+)年/), mM = item.arrived.match(/(\d+)月/);
                    if (yM) yVal = yM[1]; if (mM) mVal = mM[1];
                }
                document.getElementById('form-arrived-year').value = yVal; document.getElementById('form-arrived-month').value = mVal;
                document.getElementById('form-paid').value = item.paid; document.getElementById('form-currency').value = item.currency || 'HKD';
                document.getElementById('form-balance').value = item.balance; document.getElementById('form-balance-currency').value = item.balanceCurrency || 'RMB';
                document.getElementById('form-platform').value = platformSettings.some(p => p.id === item.platform) ? item.platform : '其他';
                document.getElementById('form-fullpaid').checked = item.fullpaid; document.getElementById('form-pic').value = item.pic;
                document.getElementById('form-remarks').value = item.remarks;

                if (item.pic) {
                    document.getElementById('pic-preview').innerHTML = (item.pic.startsWith('http') || item.pic.startsWith('data:image')) ? `<img src="${item.pic}">` : `<span>${item.pic}</span>`;
                }
                calculateConvertedPrice();
            } else {
                document.getElementById('modal-action-title').innerText = '新增谷子記錄'; document.getElementById('edit-index').value = '';
                selectedFormIPs = ipSettings.length > 0 ? [ipSettings[0].id] : ['OTHERS']; updateFormIPClasses();
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
                document.getElementById('form-currency').value = 'HKD'; document.getElementById('form-balance-currency').value = 'RMB';
                document.getElementById('form-arrived-year').value = new Date().getFullYear(); document.getElementById('form-arrived-month').value = '';
                if (platformSettings.length > 0) document.getElementById('form-platform').value = platformSettings[0].id;
            }

            document.body.style.overflow = 'hidden';
            modal.classList.add('active'); 
        }

        function closeModal() { 
            const modal = document.getElementById('goods-modal');
            modal.classList.remove('active'); 
            document.body.style.overflow = '';
        }
        
        function saveGoods(event) {
            event.preventDefault(); const index = document.getElementById('edit-index').value;
            const y = document.getElementById('form-arrived-year').value.trim(), m = document.getElementById('form-arrived-month').value.trim();
            let combined = (y || m) ? `${y ? y + '年' : ''}${m ? m + '月' : ''}` : '';

            const itemData = {
                item: document.getElementById('form-item').value,
                ip: selectedFormIPs.length > 0 ? selectedFormIPs : ['OTHERS'],
                status: document.getElementById('form-status').value,
                date: document.getElementById('form-date').value,
                arrived: combined,
                paid: parseFloat(document.getElementById('form-paid').value) || 0,
                currency: document.getElementById('form-currency').value,
                balance: parseFloat(document.getElementById('form-balance').value) || 0,
                balanceCurrency: document.getElementById('form-balance-currency').value,
                platform: document.getElementById('form-platform').value,
                fullpaid: document.getElementById('form-fullpaid').checked,
                pic: document.getElementById('form-pic').value,
                remarks: document.getElementById('form-remarks').value
            };

            if (index !== '') goodsList[index] = itemData; else goodsList.push(itemData);
            saveData(); closeModal(); window.location.reload();
        }

        function duplicateGoods(index) { const dup = JSON.parse(JSON.stringify(goodsList[index])); dup.item += " (Copy)"; goodsList.splice(index + 1, 0, dup); saveData(); }
        function editGoods(index) { openModal('edit', index); }
        function deleteGoods(index) { if (confirm('確定要刪除這個記錄嗎？')) { goodsList.splice(index, 1); saveData(); } }

        function exportData() {
            try {
                const jsonString = JSON.stringify({ goodsList, globalRate, ipSettings, platformSettings, headerTitle }, null, 2);
                const blob = new Blob([jsonString], { type: "application/json;charset=utf-8" });
                const url = URL.createObjectURL(blob); const a = document.createElement('a');
                a.href = url; a.download = `goodsbackup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            } catch (err) { alert('備份失敗：' + err.message); }
        }

        function importData() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0], reader = new FileReader();
                reader.onload = re => {
                    try {
                        const parsed = JSON.parse(re.target.result);
                        let incomingList = parsed.goodsList || (Array.isArray(parsed) ? parsed : []);
                        if (incomingList.length === 0) return alert('格式錯誤，請上傳有效的備份 JSON 檔案。');

                        incomingList.forEach(item => {
                            if (item.status === '已出貨' || item.status === '出貨') item.status = '待收貨';
                            if (item.status === '已到貨' || item.status === '到貨') item.status = '已到貨';
                            if (item.status === '待出貨') item.status = '待發貨';
                            if (typeof item.ip === 'string') item.ip = [item.ip];
                            if (!item.ip) item.ip = ["OTHERS"];
                        });

                        let incomingPlatformSettings = [];
                        if (parsed.platformSettings) {
                            if (parsed.platformSettings.length > 0 && typeof parsed.platformSettings[0] === 'string') {
                                incomingPlatformSettings = parsed.platformSettings.map(p => ({ id: p, name: p, pic: "" }));
                            } else { incomingPlatformSettings = parsed.platformSettings; }
                        }

                        let incomingIpSettings = parsed.ipSettings || [];
                        incomingIpSettings.forEach(ip => { if (!ip.hasOwnProperty('pic')) ip.pic = ""; });

                        const overwrite = !confirm('發現手帳記錄！\n\n【確定】將備份與現有記錄「合併」\n【取消】將備份「完全覆蓋」現有紀錄');

                        const compressTasks = [];
                        
                        incomingList.forEach(item => {
                            if (item.pic && item.pic.startsWith('data:image')) {
                                const task = compressImage(item.pic, 500, 0.7).then(compressed => { item.pic = compressed; });
                                compressTasks.push(task);
                            }
                        });

                        incomingIpSettings.forEach(ip => {
                            if (ip.pic && ip.pic.startsWith('data:image')) {
                                const task = compressImage(ip.pic, 100, 0.7).then(compressed => { ip.pic = compressed; });
                                compressTasks.push(task);
                            }
                        });

                        incomingPlatformSettings.forEach(plat => {
                            if (plat.pic && plat.pic.startsWith('data:image')) {
                                const task = compressImage(plat.pic, 100, 0.7).then(compressed => { plat.pic = compressed; });
                                compressTasks.push(task);
                            }
                        });

                        Promise.all(compressTasks).then(() => {
                            if (overwrite) {
                                goodsList = incomingList;
                                if (parsed.globalRate) { globalRate = parseFloat(parsed.globalRate); localStorage.setItem('goodsTrackerRate', globalRate); }
                                if (parsed.ipSettings) { ipSettings = incomingIpSettings; localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings)); }
                                if (incomingPlatformSettings.length > 0) { platformSettings = incomingPlatformSettings; localStorage.setItem('goodsTrackerPlatformSettings', JSON.stringify(platformSettings)); }
                                if (parsed.headerTitle) { headerTitle = parsed.headerTitle; localStorage.setItem('goodsTrackerHeaderTitle', headerTitle); }
                            } else {
                                incomingList.forEach(inc => { 
                                    if (!goodsList.some(ex => ex.item === inc.item && ex.date === inc.date && ex.paid === inc.paid)) { goodsList.push(inc); }
                                });
                                if (parsed.ipSettings) {
                                    incomingIpSettings.forEach(incIp => { 
                                        if (!ipSettings.some(ex => ex.id === incIp.id)) { ipSettings.push(incIp); } 
                                        else { let existing = ipSettings.find(ex => ex.id === incIp.id); if (existing && !existing.pic && incIp.pic) existing.pic = incIp.pic; }
                                    });
                                    localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings));
                                }
                                if (incomingPlatformSettings.length > 0) {
                                    incomingPlatformSettings.forEach(incP => { 
                                        if (!platformSettings.some(ex => ex.id === incP.id)) { platformSettings.push(incP); } 
                                        else { let existing = platformSettings.find(ex => ex.id === incP.id); if (existing && !existing.pic && incP.pic) existing.pic = incP.pic; }
                                    });
                                    localStorage.setItem('goodsTrackerPlatformSettings', JSON.stringify(platformSettings));
                                }
                            }
                            saveData(); window.location.reload();
                        });
                    } catch (err) { alert('導入失敗：' + err.message); }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetToDefaultSystem() {
            if (confirm('🚨 警告：確定要還原手帳嗎？')) {
                if (confirm('🔥 最後確認：你真的要清除所有數據嗎？')) {
                    try {
                        localStorage.removeItem('goodsTrackerData');
                        localStorage.removeItem('goodsTrackerRate');
                        localStorage.removeItem('goodsTrackerIpSettings');
                        localStorage.removeItem('goodsTrackerPlatformSettings');
                        localStorage.removeItem('goodsTrackerHeaderTitle');
                        localStorage.removeItem('goodsTrackerSortMode');
                        alert('✨ 系統已成功還原！');
                        window.location.reload(); 
                    } catch(e) { alert('還原失敗：' + e.message); }
                }
            }
        }

        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            const style = document.createElement('style');
            style.innerHTML = 'html, body { overscroll-behavior-y: none !important; }';
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
