<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>谷子手帳 Goods Tracker</title>
    <style>
        :root {
            --primary-color: #d85c80;
            --primary-light: #fbebee;
            --bg-color: #faf6f7;
            --card-bg: #ffffff;
            --text-color: #4a3e41;
            --text-light: #8c7e81;
            --border-color: #f0e2e5;
            --accent-sb: #ffccd5;
            --status-pending: #ecebeb;
            --status-shipped: #fef1cf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 100px; /* Space for the persistent bottom bar */
            font-size: 14px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .container {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 3-Block Summary Dashboard */
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            background: #fafafa;
            padding: 8px 4px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #fdfdfd;
            min-width: 0;
        }

        .stat-item.highlight-stat {
            background: #fff0f3;
            border-color: #ffe3e8;
        }

        .stat-item .value {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-item .label {
            font-size: 11px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Exchange Rate & IP Manager Panel (一行過排版) */
        .rate-setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 11px;
            color: var(--text-light);
            background: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            transition: all 0.3s ease; /* 增加平滑過渡效果 */
        }

        /* 當設定面板展開時，強制將容器改為置中排版 */
        .rate-setting.settings-active {
            justify-content: center;
        }

        .rate-setting input[type="number"] {
            width: 50px;
            padding: 2px 4px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
        }

        .system-settings-toggle {
            display: inline-block;
            margin-top: 0;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* 新增：用於動態隱藏匯率的樣式 */
        .hide-rate {
            display: none !important;
        }

        .system-settings-panel {
            display: none;
            margin-bottom: 12px;
            padding: 12px;
            background: #fff;       /* 給面板一個柔和的白底 */
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            text-align: left;
        }

        .system-settings-panel.active {
            display: block;
        }

        /* 專屬微調：只將系統設定面板內的刪除按鈕字體變細 */
        .system-settings-panel .action-btn.delete {
            font-size: 9px !important;
            font-weight: normal;
        }

        .settings-section-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 6px;
            margin-top: 10px;
            padding-left: 2px;
        }

        .settings-section-title:first-of-type {
            margin-top: 0;
        }

        /* Lists inside Panel (移除原本的限制滾動，改成自適應高度) */
        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdfafb;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .settings-add-form {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 12px;
        }

        .settings-add-form input[type="text"] {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
        }

        .settings-add-form input[type="color"] {
            border: none;
            width: 28px;
            height: 28px;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        .settings-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Dual-row Filters */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .filter-row-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .filter-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            flex: 1;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .filter-row-label {
            font-size: 10px;
            color: var(--text-light);
            font-weight: bold;
            margin-bottom: 2px;
            padding-left: 4px;
        }

        .filter-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Sorting Button Styling */
        .sort-btn {
            background: var(--primary-light);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            margin-left: 8px;
        }

        .sort-btn:active {
            transform: scale(0.95);
        }

        /* Card List */
        .goods-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .goods-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 完成狀態下的卡片背景改為淺灰色 */
        .goods-card.card-completed {
            background-color: #f1f1f1 !important; /* 淺灰色背景 */
            border-color: #e0e0e0;                 /* 稍微深一點的邊框 */
        }

        .goods-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ip-badges-wrapper {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .ip-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .status-select-btn {
            border: none;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-select-btn:active {
            transform: scale(0.95);
        }

        .status-pending {
            background-color: #f1f3f5;
            color: #495057;
        }

        .status-shipped {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-arrived {
            background-color: #d4edda;
            color: #155724;
        }

        .status-completed {
            background-color: #5c5556; /* 深灰色背景 */
            color: #ffffff;            /* 白色字 */
        }

        .goods-body {
            display: flex;
            gap: 12px;
        }

        .goods-pic {
            width: 130px;
            height: 100px;
            background: #fdf6f7;
            border: 1px dashed #e0ccd0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .goods-pic img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 縮圖完整顯示不裁切 */
        }

        .goods-pic span {
            font-size: 10px;
            color: var(--text-light);
            text-align: center;
            padding: 4px;
        }

        .goods-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .goods-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .goods-meta {
            font-size: 11px;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .meta-item {
            background: #f7f3f4;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .goods-financials {
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-top: 1px solid #fcf6f7;
            padding-top: 8px;
            margin-top: 4px;
            font-size: 12px;
        }

        .financial-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-tag {
            color: var(--primary-color);
            font-weight: bold;
        }

        .balance-tag {
            color: #e56b3f;
            font-weight: bold;
        }

        .total-cost-tag {
            color: #55a630;
            font-weight: bold;
        }

        .remarks-section {
            font-size: 11px;
            color: #7a6a6d;
            background: #fff9fa;
            padding: 6px 8px;
            border-radius: 6px;
            border-left: 3px solid var(--primary-color);
            margin-top: 2px;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid var(--border-color);
            padding-top: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .action-btn.edit {
            color: #4a90e2;
        }

        .action-btn.delete {
            color: #e24a4a;
        }

        /* Fixed Bottom Action Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -3px 12px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 64px;
            z-index: 9999;
            padding: 0 30px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(216, 92, 128, 0.45);
            transform: translateY(-12px);
        }

        /* Lightbox Preview */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox-overlay.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            object-fit: contain;
        }

        /* Modal styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5); /* 背後維持舒服的半透明暗色遮罩 */
            z-index: 10000;
            align-items: flex-end;
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            background: white;
            width: 100%;
            height: 80vh;           /* 改為 100vh 撐滿螢幕，這樣頂部就絕對不會露出粉紅色背景！ */
            border-top-left-radius: 0px;
            border-top-right-radius: 0px;
            
            /* 【核心修改】增加頂部 Padding (50px)，把內容整體往下推，留出舒服的空白 */
            padding: 40px 20px 80px 20px; 
            
            overflow-y: auto;       /* 只允許內部滾動 */
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 儲存按鈕維持固定在最底，高度精緻 */
        .modal-content .submit-btn {
            position: fixed; /* 改為 fixed 確保牢牢鎖在螢幕最底 */
            bottom: 0;
            left: 0;
            right: 0;
            margin: 0;
            border-radius: 0;
            padding: 12px;
            font-size: 14px;
            z-index: 10;
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
        }

        /* 鎖定主頁滾動的 Class */
        body.modal-open {
            overflow: hidden !important;
            height: 100vh !important;
        }

        .modal-title {
            font-size: 16px;
            font-weight: bold;
            margin-top: 4px;
            margin-bottom: 16px;
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px;
        }

        .form-group {
            margin-bottom: 12px;
            min-width: 0;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .form-control {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
        }

        input.form-control, select.form-control {
            height: 36px; /* 縮減至最精緻俐落的矮高度，iOS上不會顯得笨重 */
            line-height: 20px;
            padding: 6px 10px;
        }

        input[type="date"].form-control {
          max-width: 210px;         /* 限制最大寬度為 200px */
          max-height: 36px !important;
          text-align: center;         /* 解決 iOS 日期文字被預設強制置中的問題 */
          display: block;
          -webkit-appearance: none; /* 去除 iOS 原生瀏覽器可能出現的怪異陰影 */
          appearance: none;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
            min-width: 0;
        }

        /* Double-Dropdown Container for Year/Month Picker */
        .dropdown-double-row {
            display: flex;
            gap: 6px;
        }

        .dropdown-double-row select {
            flex: 1;
            min-width: 0;
        }

        /* Styled Multiple Selector Tags for IP Selection */
        .ip-tags-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .ip-tag-option {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        .ip-tag-option.unselected {
            background: #f1f3f5 !important;
            color: var(--text-color) !important;
            border-color: transparent !important;
        }

        .submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
        }

        /* Image Upload */
        .upload-container {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }

        .upload-preview {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            flex: 1;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn-styled {
            border: 1px dashed var(--primary-color);
            color: var(--primary-color);
            background-color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            display: block;
        }

        /* 讓已付同尾款可以完美並排 */
        .financial-row-form {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .financial-row-form .form-group {
            flex: 1;
            min-width: 0;
            margin-bottom: 0; /* 移除原本底部的間距 */
        }
    </style>
</head>
<body>

    <!-- 加上了 id 方便 JavaScript 動態替換標題 -->
    <header id="main-header">🍡 谷子手帳 Goods Tracker</header>

    <div class="container">
        <div class="summary-card">
            <div class="stat-item highlight-stat">
                <div class="label">即將到貨 📦</div>
                <div class="value" id="imminent-count">0</div>
            </div>
            <div class="stat-item">
                <div class="label">未收貨件 ⌛</div>
                <div class="value" id="pending-count">0</div>
            </div>
            <div class="stat-item">
                <div class="label">尾款 💸</div>
                <div class="value" id="total-balance">¥0</div>
            </div>
        </div>

        <!-- 外框容器：只放匯率與設定按鈕 -->
        <div class="rate-setting" id="rate-setting-wrapper">
            <div id="rate-container">💰 預設匯率 1 RMB = <input type="number" step="0.01" id="global-rate" value="1.16" onchange="updateGlobalRate()"> HKD</div>
            <span class="system-settings-toggle" onclick="toggleSystemSettings()">⚙️ 系統設定</span>
        </div>
        
        <!-- 移出來的面板：獨立在下方，完美上下排列 -->
        <div class="system-settings-panel" id="system-settings-panel">
            <!-- 新增：自訂手帳標題 Section -->
            <div class="settings-section-title">✍️ 自訂手帳標題</div>
            <div class="settings-add-form" style="margin-bottom: 16px;">
                <input type="text" id="custom-header-title" placeholder="輸入新的手帳標題 (例如: Usahana's HandBook)">
                <button class="settings-btn" onclick="updateHeaderTitle()">儲存標題</button>
            </div>

            <!-- IP 分類 Section -->
            <div class="settings-section-title">🎨 IP 分類及顏色管理</div>
            <div class="settings-list" id="ip-manager-list"></div>
            <div class="settings-add-form">
                <input type="text" id="new-ip-name" placeholder="例如: Usahana">
                <input type="color" id="new-ip-color" value="#ffccd5">
                <button class="settings-btn" onclick="addNewIp()">＋新增 IP</button>
            </div>

            <!-- 購買平台 Section -->
            <div class="settings-section-title">🛒 購買平台管理</div>
            <div class="settings-list" id="platform-manager-list"></div>
            <div class="settings-add-form">
                <input type="text" id="new-platform-name" placeholder="例如: 煤爐">
                <button class="settings-btn" onclick="addNewPlatform()">＋新增平台</button>
            </div>
        </div>

        <div class="filter-section">
            <div>
                <div class="filter-row-label">狀態</div>
                <div class="filter-row" id="status-filters">
                    <button class="filter-btn active" onclick="filterStatus('ongoing', event)">進行中</button>
                    <button class="filter-btn" onclick="filterStatus('all', event)">全部</button>
                    <button class="filter-btn" onclick="filterStatus('待出貨', event)">待出貨</button>
                    <button class="filter-btn" onclick="filterStatus('出貨', event)">出貨</button>
                    <button class="filter-btn" onclick="filterStatus('到貨', event)">到貨</button>
                    <button class="filter-btn" onclick="filterStatus('完成', event)">完成</button>
                </div>
            </div>
            <div>
                <div class="filter-row-label">IP分類</div>
                <div class="filter-row-container">
                    <div class="filter-row" id="ip-filters"></div>
                    <button class="sort-btn" id="cycle-sort-btn" onclick="cycleSortMode()">📅 到貨期 ▼</button>
                </div>
            </div>
        </div>

        <div class="goods-list" id="goods-container"></div>
    </div>

    <div class="bottom-bar">
        <span style="margin-top: 10px; font-size: 12px; color: var(--text-light); cursor:pointer;" onclick="exportData()">💾 備份</span>
        <button class="add-btn" onclick="openModal('add'); event.preventDefault();">+</button>
        <span style="margin-top: 10px; font-size: 12px; color: var(--text-light); cursor:pointer;" onclick="importData()">📂 導入</span>
    </div>

    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
        <img class="lightbox-content" id="lightbox-img" src="" alt="圖片放大預覽">
    </div>

    <div class="modal" id="goods-modal">
        <div class="modal-content">
            <div class="modal-title">
                <span id="modal-action-title">新增谷子記錄</span>
                <button type="button" class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="goods-form" onsubmit="saveGoods(event)" style="display: flex; flex-direction: column; height: 100%; overflow: visible;">
                <input type="hidden" id="edit-index">
                
                <div class="form-group" style="margin-bottom: 12px;">
                    <label>物品名稱 *</label>
                    <input type="text" id="form-item" class="form-control" placeholder="例如: 掛件 x 1" required>
                </div>

                <div class="form-group">
                    <label>IP分類 * (可多選)</label>
                    <div class="ip-tags-container" id="form-ip-container"></div>
                </div>

                <div class="form-row" style="margin-bottom: 12px;">
                    <div class="form-group" style="flex: 1.2;">
                        <label>下單日期</label>
                        <input type="date" id="form-date" class="form-control">
                    </div>
                    <div class="form-group" style="flex: 0.8;">
                        <label>預計到貨(年/月)</label>
                        <div class="dropdown-double-row">
                            <input type="number" id="form-arrived-year" class="form-control" placeholder="年" min="2026" max="2100">
                            <input type="number" id="form-arrived-month" class="form-control" placeholder="月" min="1" max="12">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>狀態</label>
                        <select id="form-status" class="form-control">
                            <option value="待出貨">待出貨</option>
                            <option value="出貨">出貨</option>
                            <option value="到貨">到貨</option>
                            <option value="完成">完成</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>購買平台</label>
                        <select id="form-platform" class="form-control"></select>
                    </div>
                </div>

                <!-- 將已付、尾款包在同一個 flex row 裡面一行過 -->
                <div class="financial-row-form">
                    <div class="form-group">
                        <label>已付</label>
                        <div class="dropdown-double-row">
                            <select id="form-currency" class="form-control" style="flex: 0.45;" onchange="calculateConvertedPrice()">
                                <option value="HKD">HKD</option>
                                <option value="RMB">RMB</option>
                            </select>
                            <input type="number" step="0.01" id="form-paid" class="form-control" style="flex: 0.6;" placeholder="金額" oninput="calculateConvertedPrice()">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>尾款</label>
                        <div class="dropdown-double-row">
                            <select id="form-balance-currency" class="form-control" style="flex: 0.45;" onchange="calculateConvertedPrice()">
                                <option value="RMB">RMB</option>
                                <option value="HKD">HKD</option>
                            </select>
                            <input type="number" step="0.1" id="form-balance" class="form-control" style="flex: 0.6;" placeholder="金額" oninput="calculateConvertedPrice()">
                        </div>
                    </div>
                </div>
                
                <!-- 匯率預覽保留在它們正下方 -->
                <div id="conversion-preview" style="font-size:11px; color:var(--primary-color); margin-top:-8px; margin-bottom:12px; padding-left:2px;"></div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="form-fullpaid">
                        <label for="form-fullpaid" style="margin-bottom:0; font-size:13px; cursor:pointer;">已全付 (Full Paid)</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>截圖 / 相片 (盡量上傳較小圖片以節省空間)</label>
                    <div class="upload-container">
                        <div class="upload-preview" id="pic-preview">
                            <span style="font-size:10px; color:var(--text-light);">📸 無圖</span>
                        </div>
                        <div class="upload-btn-wrapper">
                            <button type="button" class="upload-btn-styled">選擇手機相簿/相機</button>
                            <input type="file" id="form-file" accept="image/*" onchange="handleImageUpload(event)">
                        </div>
                        <button type="button" class="action-btn delete" style="font-size:11px;" onclick="clearUploadedImage()">清除</button>
                    </div>
                    <input type="hidden" id="form-pic">
                </div>

                <div class="form-group" style="padding-bottom: 20px;"> <label>備註</label>
                    <textarea id="form-remarks" class="form-control" rows="2" placeholder=""></textarea>
                </div>

                <button type="submit" class="submit-btn">儲存記錄</button>
            </form>
        </div>
    </div>

    <script>
        // Default IP list with colors
        const defaultIpSettings = [
            { id: "IP1", name: "IP1", color: "#ffe3e8", textColor: "#d85c80" },
            { id: "IP2", name: "IP2", color: "#e3f0ff", textColor: "#3b7ec4" },
            { id: "IP3", name: "IP3", color: "#fef1cf", textColor: "#9e7715" },
            { id: "OTHERS", name: "其他", color: "#ecebeb", textColor: "#5c5556" }
        ];

        // Default Purchase Platform list
        const defaultPlatformSettings = ["淘寶", "閒魚", "小紅書", "官網", "拼團", "其他"];

        // Internal template data
        const defaultData = [
            {
                item: "Item 1",
                ip: ["IP1"],
                status: "待出貨",
                date: "2026-06-01",
                arrived: "2026年7月",
                paid: 100,
                currency: "HKD",
                balance: 180,
                fullpaid: false,
                platform: "小紅書",
                pic: "🐰🌸🐰",
                remarks: ""
            },
            {
                item: "Item 2",
                ip: ["IP2"],
                status: "出貨",
                date: "2026-06-01",
                arrived: "2026年8月",
                paid: 100,
                currency: "RMB",
                balance: 0,
                fullpaid: false,
                platform: "拼團",
                pic: "🎒👜👛",
                remarks: ""
            },
            {
                item: "Item 3",
                ip: ["IP3"],
                status: "待出貨",
                date: "2026-05-01",
                arrived: "2026年9月",
                paid: 100,
                currency: "HKD",
                balance: 0,
                fullpaid: true,
                platform: "官網",
                pic: "🏷️✨",
                remarks: ""
            }
        ];

        // Safe localStorage loading
        let goodsList;
        let globalRate;
        let ipSettings;
        let platformSettings;
        let headerTitle; // 自訂手帳標題變數
        try {
            goodsList = JSON.parse(localStorage.getItem('goodsTrackerData')) || defaultData;
            globalRate = parseFloat(localStorage.getItem('goodsTrackerRate')) || 1.16;
            ipSettings = JSON.parse(localStorage.getItem('goodsTrackerIpSettings')) || defaultIpSettings;
            platformSettings = JSON.parse(localStorage.getItem('goodsTrackerPlatformSettings')) || defaultPlatformSettings;
            headerTitle = localStorage.getItem('goodsTrackerHeaderTitle') || "🍡 谷子手帳 Goods Tracker";
        } catch (e) {
            console.warn("LocalStorage access blocked/disabled. Using session cache.");
            goodsList = defaultData;
            globalRate = 1.16;
            ipSettings = defaultIpSettings;
            platformSettings = defaultPlatformSettings;
            headerTitle = "🍡 谷子手帳 Goods Tracker";
        }

        // Migration logic
        goodsList.forEach(item => {
            if (item.status === '已出貨') item.status = '出貨';
            if (item.status === '已到貨') item.status = '到貨';
            if (typeof item.ip === 'string') {
                item.ip = [item.ip];
            } else if (!item.ip) {
                item.ip = ["OTHERS"];
            }
        });

        // Current UI trackers
        let selectedFormIPs = [];
        let currentStatusFilter = 'ongoing';
        let currentIPFilter = 'all';

        // Sort settings
        let sortModes = ['arrived_desc', 'arrived_asc', 'order_desc', 'order_asc'];
        let sortLabels = ['📅 到貨期 ▼', '📅 到貨期 ▲', '🛒 下單日 ▼', '🛒 下單日 ▲'];
        let currentSortIndex = 0;

        document.getElementById('global-rate').value = globalRate.toFixed(2);

        document.addEventListener("DOMContentLoaded", function() {
            // 初始化並套用手帳自訂標題
            document.getElementById('main-header').innerText = headerTitle;
            document.getElementById('custom-header-title').value = headerTitle;

            renderFilters();
            renderSettingsManager();
            render();
        });

        function updateGlobalRate() {
            const inputVal = parseFloat(document.getElementById('global-rate').value);
            if (!isNaN(inputVal) && inputVal > 0) {
                globalRate = inputVal;
                try {
                    localStorage.setItem('goodsTrackerRate', globalRate);
                } catch(e){}
                calculateConvertedPrice();
                render();
            }
        }

        /* --- 儲存與更新手帳標題 --- */
        function updateHeaderTitle() {
            const newTitle = document.getElementById('custom-header-title').value.trim();
            if (!newTitle) {
                alert('請輸入手帳標題！');
                return;
            }
            headerTitle = newTitle;
            document.getElementById('main-header').innerText = headerTitle;
            try {
                localStorage.setItem('goodsTrackerHeaderTitle', headerTitle);
                alert('手帳標題已成功儲存！');
            } catch(e){
                console.warn("無法儲存標題到 LocalStorage");
            }
        }

        /* --- Collapsible System Settings Panel --- */
        function toggleSystemSettings() {
            const panel = document.getElementById('system-settings-panel');
            const rateContainer = document.getElementById('rate-container');
            const rateWrapper = document.getElementById('rate-setting-wrapper');
            
            // 切換面板展開/收起
            panel.classList.toggle('active');
            
            if (panel.classList.contains('active')) {
                rateContainer.classList.add('hide-rate');      // 隱藏匯率
                rateWrapper.classList.add('settings-active');  // 按鈕置中
            } else {
                rateContainer.classList.remove('hide-rate');   // 顯示匯率
                rateWrapper.classList.remove('settings-active');// 恢復原狀
            }
        }

        // Helper for contrast text color based on background color
        function getContrastYIQ(hexcolor){
            hexcolor = hexcolor.replace("#", "");
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? '#4a3e41' : '#ffffff';
        }

        function renderSettingsManager() {
            // 1. Render IP Manager List
            const ipContainer = document.getElementById('ip-manager-list');
            ipContainer.innerHTML = '';
            ipSettings.forEach(ip => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="ip-badge" style="background-color: ${ip.color}; color: ${ip.textColor || getContrastYIQ(ip.color)};">${ip.name}</span>
                        <input type="color" value="${ip.color}" onchange="updateIpColor('${ip.id}', this.value)" style="border:none; width:22px; height:22px; cursor:pointer; background:none;">
                    </div>
                    ${ip.id !== 'OTHERS' ? `<button class="action-btn delete" onclick="deleteIp('${ip.id}')" style="padding: 2px 6px;">刪除</button>` : ''}
                `;
                ipContainer.appendChild(item);
            });

            // 2. Render Platform Manager List
            const platformContainer = document.getElementById('platform-manager-list');
            platformContainer.innerHTML = '';
            platformSettings.forEach(plat => {
                const item = document.createElement('div');
                item.className = 'settings-item';
                item.innerHTML = `
                    <span style="font-size:12px; font-weight:bold;">🛒 ${plat}</span>
                    ${plat !== '其他' ? `<button class="action-btn delete" onclick="deletePlatform('${plat}')" style="padding: 2px 6px;">刪除</button>` : ''}
                `;
                platformContainer.appendChild(item);
            });
        }

        function renderFilters() {
            const filterContainer = document.getElementById('ip-filters');
            filterContainer.innerHTML = `<button class="filter-btn ${currentIPFilter === 'all' ? 'active' : ''}" onclick="filterIP('all', event)">全部</button>`;
            
            ipSettings.forEach(ip => {
                const btn = document.createElement('button');
                btn.className = `filter-btn ${currentIPFilter === ip.id ? 'active' : ''}`;
                btn.innerText = ip.name;
                btn.onclick = (e) => filterIP(ip.id, e);
                filterContainer.appendChild(btn);
            });
        }

        /* --- IP Actions --- */
        function addNewIp() {
            const nameInput = document.getElementById('new-ip-name');
            const colorInput = document.getElementById('new-ip-color');
            const name = nameInput.value.trim();
            const color = colorInput.value;

            if (!name) {
                alert('請輸入 IP 名稱！');
                return;
            }

            const id = name.toUpperCase().replace(/\s+/g, '_');
            if (ipSettings.some(ip => ip.id === id)) {
                alert('該 IP 分類已存在！');
                return;
            }

            const newIp = {
                id: id,
                name: name,
                color: color,
                textColor: getContrastYIQ(color)
            };

            ipSettings.push(newIp);
            saveIpSettings();
            
            nameInput.value = '';
            renderSettingsManager();
            renderFilters();
            render();
        }

        function updateIpColor(id, newColor) {
            const ip = ipSettings.find(item => item.id === id);
            if (ip) {
                ip.color = newColor;
                ip.textColor = getContrastYIQ(newColor);
                saveIpSettings();
                renderSettingsManager();
                renderFilters();
                render();
            }
        }

        function deleteIp(id) {
            if (id === 'OTHERS') return;
            if (confirm(`確定要刪除 IP 分類 "${id}" 嗎？\n刪除後，該分類下的物品將會自動歸類到「其他」分類。`)) {
                goodsList.forEach(item => {
                    if (Array.isArray(item.ip)) {
                        item.ip = item.ip.map(val => val === id ? 'OTHERS' : val);
                    } else if (item.ip === id) {
                        item.ip = ['OTHERS'];
                    }
                });

                ipSettings = ipSettings.filter(ip => ip.id !== id);
                if (currentIPFilter === id) currentIPFilter = 'all';

                saveIpSettings();
                saveData();
                closeModal(); // 這裡會自動呼叫解鎖
                renderSettingsManager();
                renderFilters();
                render();
            }
        }

        function saveIpSettings() {
            try {
                localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings));
            } catch(e){}
        }

        /* --- Platform Actions --- */
        function addNewPlatform() {
            const input = document.getElementById('new-platform-name');
            const name = input.value.trim();

            if (!name) {
                alert('請輸入平台名稱！');
                return;
            }

            if (platformSettings.includes(name)) {
                alert('該平台已存在！');
                return;
            }

            // Insert before '其他' if exists, otherwise push
            const otherIndex = platformSettings.indexOf('其他');
            if (otherIndex > -1) {
                platformSettings.splice(otherIndex, 0, name);
            } else {
                platformSettings.push(name);
            }

            savePlatformSettings();
            input.value = '';
            renderSettingsManager();
        }

        function deletePlatform(name) {
            if (name === '其他') return;
            if (confirm(`確定要刪除平台 "${name}" 嗎？\n刪除後，原屬於此平台的物品會自動變為「其他」分類。`)) {
                goodsList.forEach(item => {
                    if (item.platform === name) {
                        item.platform = '其他';
                    }
                });
                platformSettings = platformSettings.filter(p => p !== name);
                savePlatformSettings();
                saveData();
                renderSettingsManager();
            }
        }

        function savePlatformSettings() {
            try {
                localStorage.setItem('goodsTrackerPlatformSettings', JSON.stringify(platformSettings));
            } catch(e){}
        }

        /* --- Form Dynamics --- */
        function renderFormIpTags() {
            const container = document.getElementById('form-ip-container');
            container.innerHTML = '';
            
            ipSettings.forEach(ip => {
                const tag = document.createElement('div');
                tag.className = 'ip-tag-option';
                tag.setAttribute('data-value', ip.id);
                tag.innerText = ip.name;
                
                tag.style.backgroundColor = ip.color;
                tag.style.color = ip.textColor || getContrastYIQ(ip.color);
                tag.style.borderColor = ip.textColor || getContrastYIQ(ip.color);
                
                tag.onclick = () => toggleFormIP(ip.id);
                container.appendChild(tag);
            });
            updateFormIPClasses();
        }

        function toggleFormIP(val) {
            const index = selectedFormIPs.indexOf(val);
            if (index > -1) {
                if (selectedFormIPs.length > 1) {
                    selectedFormIPs.splice(index, 1);
                }
            } else {
                selectedFormIPs.push(val);
            }
            updateFormIPClasses();
        }

        function updateFormIPClasses() {
            document.querySelectorAll('.ip-tag-option').forEach(el => {
                const val = el.getAttribute('data-value');
                if (selectedFormIPs.includes(val)) {
                    el.classList.remove('unselected');
                    const ip = ipSettings.find(item => item.id === val);
                    if (ip) {
                        el.style.backgroundColor = ip.color;
                        el.style.color = ip.textColor || getContrastYIQ(ip.color);
                    }
                } else {
                    el.classList.add('unselected');
                    el.style.backgroundColor = '#f1f3f5';
                    el.style.color = 'var(--text-color)';
                }
            });
        }

        function renderFormPlatforms() {
            const select = document.getElementById('form-platform');
            select.innerHTML = '';
            platformSettings.forEach(plat => {
                const opt = document.createElement('option');
                opt.value = plat;
                opt.innerText = plat;
                select.appendChild(opt);
            });
        }

        // Fast status toggle
        function toggleStatus(index, event) {
            if (event) event.stopPropagation();
            const item = goodsList[index];
            if (item.status === '待出貨') {
                item.status = '出貨';
            } else if (item.status === '出貨') {
                item.status = '到貨';
            } else if (item.status === '到貨') {
                item.status = '完成';
            } else {
                item.status = '待出貨';
            }
            saveData();
        }

        function saveData() {
            try {
                localStorage.setItem('goodsTrackerData', JSON.stringify(goodsList));
            } catch(e) {
                console.warn("localStorage write disallowed");
            }
            render();
        }

        function cycleSortMode() {
            currentSortIndex = (currentSortIndex + 1) % 4;
            document.getElementById('cycle-sort-btn').innerText = sortLabels[currentSortIndex];
            render();
        }

        function parseArrivalDate(str) {
            if (!str) return null;
            let matches = str.match(/\d+/g);
            if (!matches) return null;
            let year = 2026;
            let month = 1;

            if (matches.length === 1) {
                month = parseInt(matches[0]);
            } else if (matches.length >= 2) {
                year = parseInt(matches[0]);
                if (year < 100) year += 2000;
                month = parseInt(matches[1]);
            }
            return new Date(year, month - 1, 1).getTime();
        }

        function openLightbox(picSrc, event) {
            if (event) event.stopPropagation();
            if (!picSrc || (!picSrc.startsWith('http') && !picSrc.startsWith('data:image'))) return;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = picSrc;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function calculateConvertedPrice() {
            const amount = parseFloat(document.getElementById('form-paid').value) || 0;
            const currency = document.getElementById('form-currency').value;
            const balAmount = parseFloat(document.getElementById('form-balance').value) || 0;
            const balCurrency = document.getElementById('form-balance-currency').value;
            const preview = document.getElementById('conversion-preview');
            
            let parts = [];
            if (amount > 0) {
                if (currency === 'RMB') {
                    parts.push(`已付: ¥${amount} (折合 $${(amount * globalRate).toFixed(2)} HKD)`);
                } else {
                    parts.push(`已付: $${amount} HKD`);
                }
            }
            if (balAmount > 0) {
                if (balCurrency === 'RMB') {
                    parts.push(`尾款: ¥${balAmount} (折合 $${(balAmount * globalRate).toFixed(2)} HKD)`);
                } else {
                    parts.push(`尾款: $${balAmount} HKD`);
                }
            }

            if (parts.length > 0) {
                preview.innerHTML = `💡 預覽折算：` + parts.join(' | ');
            } else {
                preview.innerHTML = '';
            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // 原圖高清讀取，不進行畫布壓縮裁切
                const originalBase64 = e.target.result;
                document.getElementById('form-pic').value = originalBase64;
                document.getElementById('pic-preview').innerHTML = `<img src="${originalBase64}">`;
            };
            reader.readAsDataURL(file);
        }

        function clearUploadedImage() {
            document.getElementById('form-pic').value = '';
            document.getElementById('form-file').value = '';
            document.getElementById('pic-preview').innerHTML = `<span style="font-size:10px; color:var(--text-light);">📸 無圖</span>`;
        }

        function calculateStats() {
            let imminentCount = 0;
            let pendingCount = 0;
            let balanceTotalRMB = 0;

            const now = new Date();
            const currentYearMonthTimestamp = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

            goodsList.forEach(item => {
                const isCompleted = item.status === '完成';

                if (!isCompleted) {
                    pendingCount++;
                    const arrivalTime = parseArrivalDate(item.arrived);
                    if (arrivalTime !== null && arrivalTime <= currentYearMonthTimestamp) {
                        imminentCount++;
                    }
                }
                
                const itemBalCurrency = item.balanceCurrency || 'RMB';
                const balInRMB = itemBalCurrency === 'RMB' ? Number(item.balance || 0) : (Number(item.balance || 0) / globalRate);
                balanceTotalRMB += balInRMB;
            });

            document.getElementById('imminent-count').innerText = imminentCount + " 件";
            document.getElementById('pending-count').innerText = pendingCount + " 件";
            document.getElementById('total-balance').innerText = `¥${balanceTotalRMB}`;
        }

        function render() {
            calculateStats();
            const container = document.getElementById('goods-container');
            container.innerHTML = '';

            let filteredList = goodsList.filter(item => {
                let statusMatch = false;
                if (currentStatusFilter === 'all') {
                    statusMatch = true;
                } else if (currentStatusFilter === 'ongoing') {
                    statusMatch = item.status !== '完成';
                } else {
                    statusMatch = item.status === currentStatusFilter;
                }

                let ipMatch = false;
                if (currentIPFilter === 'all') {
                    ipMatch = true;
                } else {
                    ipMatch = Array.isArray(item.ip) ? item.ip.includes(currentIPFilter) : item.ip === currentIPFilter;
                }

                return statusMatch && ipMatch;
            });

            let mode = sortModes[currentSortIndex];
            filteredList.sort((a, b) => {
                if (mode === 'arrived_desc') {
                    let tA = parseArrivalDate(a.arrived);
                    let tB = parseArrivalDate(b.arrived);
                    if (tA === null) return 1; 
                    if (tB === null) return -1;
                    return tA - tB;
                } else if (mode === 'arrived_asc') {
                    let tA = parseArrivalDate(a.arrived);
                    let tB = parseArrivalDate(b.arrived);
                    if (tA === null) return 1;
                    if (tB === null) return -1;
                    return tB - tA;
                } else if (mode === 'order_desc') {
                    let dA = a.date ? new Date(a.date).getTime() : 0;
                    let dB = b.date ? new Date(b.date).getTime() : 0;
                    return dB - dA;
                } else if (mode === 'order_asc') {
                    let dA = a.date ? new Date(a.date).getTime() : 0;
                    let dB = b.date ? new Date(b.date).getTime() : 0;
                    return dA - dB;
                }
                return 0;
            });

            if (filteredList.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-light);">暫時無相關記錄，撳下方 "+" 加一件啦！</div>`;
                return;
            }

            filteredList.forEach((item) => {
                const actualIndex = goodsList.indexOf(item);
                const card = document.createElement('div');
                
                // 「完成」狀態下的卡片套用 card-completed (淺灰底) 類別
                if (item.status === '完成') {
                    card.className = 'goods-card card-completed';
                } else {
                    card.className = 'goods-card';
                }

                let statusClass = 'status-pending';
                if (item.status === '出貨') statusClass = 'status-shipped';
                if (item.status === '到貨') statusClass = 'status-arrived';
                if (item.status === '完成') statusClass = 'status-completed';
                
                const isRMB = item.currency === 'RMB';
                const currencySymbol = isRMB ? '¥' : '$';
                const originalPaidDisplay = `${currencySymbol}${Number(item.paid || 0).toFixed(2)}`;

                const paidInHKD = isRMB ? (item.paid * globalRate) : item.paid;
                const isBalanceRMB = (item.balanceCurrency || 'RMB') === 'RMB';
                const balanceInHKD = isBalanceRMB ? ((item.balance || 0) * globalRate) : (item.balance || 0);
                const totalCostHKD = paidInHKD + balanceInHKD;

                const hasBalance = Number(item.balance || 0) > 0;
                const isOutstanding = hasBalance && !item.fullpaid;
                const paymentStatusDisplay = isOutstanding ? '<span style="color:#e56b3f; font-weight:bold;">⏳ 待補款</span>' : '<span style="color:#55a630; font-weight:bold;">✅ 已付款</span>';

                // Render dynamically styled IP badges
                let ipBadgesHTML = '';
                const itemIps = Array.isArray(item.ip) ? item.ip : [item.ip || 'OTHERS'];
                itemIps.forEach(val => {
                    const ipSetting = ipSettings.find(ip => ip.id === val) || { name: val === 'OTHERS' ? '其他' : val, color: '#ecebeb', textColor: '#5c5556' };
                    ipBadgesHTML += `<span class="ip-badge" style="background-color: ${ipSetting.color}; color: ${ipSetting.textColor || getContrastYIQ(ipSetting.color)};">${ipSetting.name}</span> `;
                });

                const isRealImage = item.pic && (item.pic.startsWith('http') || item.pic.startsWith('data:image'));

                card.innerHTML = `
                    <div class="goods-header">
                        <div class="ip-badges-wrapper">${ipBadgesHTML}</div>
                        <span class="status-select-btn ${statusClass}" onclick="toggleStatus(${actualIndex}, event)" title="點擊切換狀態">
                            ${item.status} 🔄
                        </span>
                    </div>
                    <div class="goods-body">
                        <div class="goods-pic" onclick="${isRealImage ? `openLightbox('${item.pic}', event)` : ''}">
                            ${isRealImage ? `<img src="${item.pic}">` : `<span>${item.pic || '📸 暫無相片'}</span>`}
                        </div>
                        <div class="goods-details">
                            <div class="goods-title">${item.item}</div>
                            <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px; margin-bottom: 4px; font-size: 12px;">
                                <span style="background: #e9ecef; color: #495057; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold;">🛒 ${item.platform}</span>
                                <span style="color: var(--text-light); font-size: 11px;">
                                    ${(isRMB || (Number(item.balance || 0) > 0 && isBalanceRMB)) ? '約' : ''}HKD <span class="total-cost-tag" style="font-size: 12px; color: var(--primary-color);">${totalCostHKD.toFixed(2)}</span>
                                </span>
                            </div>
                            <div class="goods-meta">
                                <span class="meta-item">📅 ${item.date || '無日期'} 下單</span>
                                <span class="meta-item">📦 ${item.arrived || '未註明'} 到貨</span>
                            </div>
                        </div>
                    </div>
                    <div class="goods-financials">
                        <div class="financial-row">
                            <div>已付: <span class="price-tag">${originalPaidDisplay}</span></div>
                            <div>尾款: ${item.balance ? `<span class="balance-tag">${(isBalanceRMB ? '¥' : '$') + item.balance}</span>` : `<span style="color: var(--text-light);">無</span>`}</div>
                            <div>${paymentStatusDisplay}</div>
                        </div>
                    </div>
                    ${item.remarks ? `<div class="remarks-section">📝 ${item.remarks}</div>` : ''}
                    <div class="card-actions">
                        <button type="button" class="action-btn duplicate" onclick="duplicateGoods(${actualIndex})" style="color: #6c757d;">複製</button>
                        <button type="button" class="action-btn edit" onclick="editGoods(${actualIndex})">修改</button>
                        <button type="button" class="action-btn delete" onclick="deleteGoods(${actualIndex})">刪除</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterStatus(status, event) {
            currentStatusFilter = status;
            document.querySelectorAll('#status-filters .filter-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }
            render();
        }

        function filterIP(ip, event) {
            currentIPFilter = ip;
            document.querySelectorAll('#ip-filters .filter-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) {
                event.target.classList.add('active');
            }
            render();
        }

        function openModal(action, index = null) {
            const modal = document.getElementById('goods-modal');
            const form = document.getElementById('goods-form');
            form.reset();
            clearUploadedImage();
            document.getElementById('conversion-preview').innerText = '';
            
            // Render form options dynamically
            renderFormIpTags();
            renderFormPlatforms();

            if (action === 'edit' && index !== null) {
                document.getElementById('modal-action-title').innerText = '修改谷子記錄';
                const item = goodsList[index];
                document.getElementById('edit-index').value = index;
                document.getElementById('form-item').value = item.item;
                
                if (Array.isArray(item.ip)) {
                    selectedFormIPs = [...item.ip];
                } else {
                    selectedFormIPs = [item.ip || 'OTHERS'];
                }
                updateFormIPClasses();

                document.getElementById('form-status').value = item.status;
                document.getElementById('form-date').value = item.date;

                let yVal = '';
                let mVal = '';
                if (item.arrived) {
                    const yearMatch = item.arrived.match(/(\d+)年/);
                    const monthMatch = item.arrived.match(/(\d+)月/);
                    if (yearMatch) yVal = yearMatch[1];
                    if (monthMatch) mVal = monthMatch[1];
                }
                document.getElementById('form-arrived-year').value = yVal;
                document.getElementById('form-arrived-month').value = mVal;

                document.getElementById('form-paid').value = item.paid;
                document.getElementById('form-currency').value = item.currency || 'HKD';
                document.getElementById('form-balance').value = item.balance;
                document.getElementById('form-balance-currency').value = item.balanceCurrency || 'RMB';
                
                // Ensure loaded platform exists in settings, fallback to '其他'
                const platToSelect = platformSettings.includes(item.platform) ? item.platform : '其他';
                document.getElementById('form-platform').value = platToSelect;
                
                document.getElementById('form-fullpaid').checked = item.fullpaid;
                document.getElementById('form-pic').value = item.pic;
                document.getElementById('form-remarks').value = item.remarks;

                if (item.pic) {
                    if (item.pic.startsWith('http') || item.pic.startsWith('data:image')) {
                        document.getElementById('pic-preview').innerHTML = `<img src="${item.pic}">`;
                    } else {
                        document.getElementById('pic-preview').innerHTML = `<span>${item.pic}</span>`;
                    }
                }
                calculateConvertedPrice();
            } else {
                document.getElementById('modal-action-title').innerText = '新增谷子記錄';
                document.getElementById('edit-index').value = '';
                
                selectedFormIPs = ipSettings.length > 0 ? [ipSettings[0].id] : ['OTHERS'];
                updateFormIPClasses();

                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
                document.getElementById('form-currency').value = 'HKD';
                document.getElementById('form-balance-currency').value = 'RMB';
                document.getElementById('form-arrived-year').value = '';
                document.getElementById('form-arrived-month').value = '';
                
                // Default to first platform
                if (platformSettings.length > 0) {
                    document.getElementById('form-platform').value = platformSettings[0];
                }
            }
            modal.classList.add('active');

            // 新增：打開彈窗時，鎖定後面主頁不讓其滾動
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            document.getElementById('goods-modal').classList.remove('active');

          // 新增：關閉彈窗時，解除鎖定，讓主頁恢復滾動
            document.body.classList.remove('modal-open');
        }

        function saveGoods(event) {
            event.preventDefault();
            const index = document.getElementById('edit-index').value;

            const y = document.getElementById('form-arrived-year').value.trim();
            const m = document.getElementById('form-arrived-month').value.trim();
            let combinedArrived = '';
            if (y || m) {
                combinedArrived = `${y ? y + '年' : ''}${m ? m + '月' : ''}`;
            }

            const itemData = {
                item: document.getElementById('form-item').value,
                ip: selectedFormIPs.length > 0 ? selectedFormIPs : ['OTHERS'],
                status: document.getElementById('form-status').value,
                date: document.getElementById('form-date').value,
                arrived: combinedArrived,
                paid: parseFloat(document.getElementById('form-paid').value) || 0,
                currency: document.getElementById('form-currency').value,
                balance: parseFloat(document.getElementById('form-balance').value) || 0,
                balanceCurrency: document.getElementById('form-balance-currency').value,
                platform: document.getElementById('form-platform').value,
                fullpaid: document.getElementById('form-fullpaid').checked,
                pic: document.getElementById('form-pic').value,
                remarks: document.getElementById('form-remarks').value
            };

            if (index !== '') {
                goodsList[index] = itemData;
            } else {
                goodsList.push(itemData);
            }

            saveData();
            closeModal();
        }

        function duplicateGoods(index) {
            const original = goodsList[index];
            const duplicated = JSON.parse(JSON.stringify(original));
            duplicated.item = duplicated.item + " (Copy)";
            goodsList.splice(index + 1, 0, duplicated);
            saveData();
        }

        function editGoods(index) {
            openModal('edit', index);
        }

        function deleteGoods(index) {
            if (confirm('確定要刪除呢條記錄嗎？')) {
                goodsList.splice(index, 1);
                saveData();
            }
        }

        /* --- Backup and Recovery (Blob API - High Compatibility) --- */
        function exportData() {
            try {
                // 打包所有資料，包括手帳清單、預設匯率、自訂 IP、自訂平台與手帳自訂標題
                const backupPayload = {
                    goodsList: goodsList,
                    globalRate: globalRate,
                    ipSettings: ipSettings,
                    platformSettings: platformSettings,
                    headerTitle: headerTitle // 加入備份中
                };
                const jsonString = JSON.stringify(backupPayload, null, 2);
                
                const blob = new Blob([jsonString], { type: "application/json;charset=utf-8" });
                const downloadUrl = URL.createObjectURL(blob);
                
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", downloadUrl);
                downloadAnchor.setAttribute("download", `goodsbackup_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(downloadAnchor);
                
                downloadAnchor.click();
                
                document.body.removeChild(downloadAnchor);
                URL.revokeObjectURL(downloadUrl);
            } catch (err) {
                alert('備份失敗：' + err.message);
            }
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = readerEvent => {
                    try {
                        const parsedContent = JSON.parse(readerEvent.target.result);
                        let incomingList = [];
                        let incomingRate = null;
                        let incomingIpSettings = null;
                        let incomingPlatformSettings = null;

                        if (parsedContent && typeof parsedContent === 'object' && parsedContent.goodsList) {
                            incomingList = parsedContent.goodsList;
                            incomingRate = parsedContent.globalRate;
                            incomingIpSettings = parsedContent.ipSettings;
                            incomingPlatformSettings = parsedContent.platformSettings;
                        } else if (Array.isArray(parsedContent)) {
                            incomingList = parsedContent;
                        } else {
                            alert('格式錯誤，請上傳有效的備份 JSON 檔案。');
                            return;
                        }

                        const isOverwrite = !confirm('發現手帳記錄！\n\n【確定】將備份與現有記錄「合併」\n（保留現有新紀錄，且自動過濾重複項）\n【取消】將備份「完全覆蓋」現有紀錄\n（會清除現有網頁上的所有新內容）');

                        if (isOverwrite) {
                            // 方案 A: 完全覆蓋
                            goodsList = incomingList;
                            if (incomingRate) {
                                globalRate = parseFloat(incomingRate);
                                localStorage.setItem('goodsTrackerRate', globalRate);
                                document.getElementById('global-rate').value = globalRate.toFixed(2);
                            }
                            if (incomingIpSettings) {
                                ipSettings = incomingIpSettings;
                                saveIpSettings();
                            }
                            if (incomingPlatformSettings) {
                                platformSettings = incomingPlatformSettings;
                                savePlatformSettings();
                            }
                            // 完全覆蓋模式：自訂標題還原
                            if (parsedContent.headerTitle) {
                                headerTitle = parsedContent.headerTitle;
                                localStorage.setItem('goodsTrackerHeaderTitle', headerTitle);
                                document.getElementById('main-header').innerText = headerTitle;
                                document.getElementById('custom-header-title').value = headerTitle;
                            }
                            saveData();
                            renderFilters();
                            renderSettingsManager();
                            alert('所有數據已完全覆蓋導入！');
                        } else {
                            // 方案 B: 智能合併
                            let addedCount = 0;
                            incomingList.forEach(incomingItem => {
                                const isDuplicate = goodsList.some(existingItem => 
                                    existingItem.item === incomingItem.item && 
                                    existingItem.date === incomingItem.date &&
                                    existingItem.paid === incomingItem.paid
                                );
                                
                                if (!isDuplicate) {
                                    goodsList.push(incomingItem);
                                    addedCount++;
                                }
                            });

                            if (incomingRate) {
                                globalRate = parseFloat(incomingRate);
                                localStorage.setItem('goodsTrackerRate', globalRate);
                                document.getElementById('global-rate').value = globalRate.toFixed(2);
                            }

                            // 合併自訂 IP 清單
                            if (incomingIpSettings) {
                                incomingIpSettings.forEach(incIp => {
                                    if (!ipSettings.some(existingIp => existingIp.id === incIp.id)) {
                                        ipSettings.push(incIp);
                                    }
                                });
                                saveIpSettings();
                            }

                            // 合併自訂購買平台清單
                            if (incomingPlatformSettings) {
                                incomingPlatformSettings.forEach(incPlat => {
                                    if (!platformSettings.includes(incPlat)) {
                                        // 插在「其他」之前
                                        const otherIndex = platformSettings.indexOf('其他');
                                        if (otherIndex > -1) {
                                            platformSettings.splice(otherIndex, 0, incPlat);
                                        } else {
                                            platformSettings.push(incPlat);
                                        }
                                    }
                                });
                                savePlatformSettings();
                            }

                            // 合併模式下也一併還原/更新自訂標題
                            if (parsedContent.headerTitle) {
                                headerTitle = parsedContent.headerTitle;
                                localStorage.setItem('goodsTrackerHeaderTitle', headerTitle);
                                document.getElementById('main-header').innerText = headerTitle;
                                document.getElementById('custom-header-title').value = headerTitle;
                            }

                            saveData();
                            renderFilters();
                            renderSettingsManager();
                            alert(`導入完成！成功合併了 ${addedCount} 條新記錄，並自動過濾了重複的記錄。`);
                        }

                    } catch (err) {
                        alert('讀取或解析備份檔案失敗！' + err.message);
                    }
                }
                reader.readAsText(file);
            }
            input.click();
        }
    </script>
</body>
