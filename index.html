<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="theme-color" content="#d85c80">
    <meta name="apple-mobile-web-app-status-bar-style" content="#d85c80">
    
    <title>谷子手帳 Goods Tracker</title>
    <style>
        :root {
            --primary-color: #d85c80;
            --primary-light: #fbebee;
            --bg-color: #faf6f7;
            --card-bg: #ffffff;
            --text-color: #4a3e41;
            --text-light: #8c7e81;
            --border-color: #f0e2e5;
            --accent-sb: #ffccd5;
            --status-pending: #ecebeb;
            --status-shipped: #fef1cf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        
        html, body {
            background-color: var(--bg-color);
        }

        /* 隱藏主網頁與彈窗的滾動條，但保留滑動功能 */
        html, body, .modal-content {
            -ms-overflow-style: none;  /* 適用於 IE / Edge */
            scrollbar-width: none;     /* 適用於 Firefox */
        }

        html::-webkit-scrollbar, 
        body::-webkit-scrollbar, 
        .modal-content::-webkit-scrollbar {
            display: none;             /* 適用於 Chrome, Safari, Web App (WebKit) */
        }
        

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 100px; /* Space for the persistent bottom bar */
            font-size: 14px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            /* 💡 3個數值代表：上 (10px) | 左右 (16px) | 下 (16px 保持不變) */
            padding: 10px 16px 16px; 
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .container {
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 3-Block Summary Dashboard */
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            background: #fafafa;
            padding: 8px 4px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #fdfdfd;
            min-width: 0;
        }

        .stat-item.highlight-stat {
            background: #fff0f3;
            border-color: #ffe3e8;
        }

        .stat-item .value {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-item .label {
            font-size: 11px;
            color: var(--text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Exchange Rate & IP Manager Panel */
        .rate-setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 11px;
            color: var(--text-light);
            background: #fff;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            transition: all 0.3s ease;
        }

        .rate-setting.settings-active {
            justify-content: center;
        }

        .rate-setting input[type="number"] {
            width: 50px;
            padding: 2px 4px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            color: var(--primary-color);
        }

        .system-settings-toggle {
            display: inline-block;
            margin-top: 0;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hide-rate {
            display: none !important;
        }

        .system-settings-panel {
            display: none;
            margin-bottom: 12px;
            padding: 12px;
            background: #fff;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            text-align: left;
        }

        .system-settings-panel.active {
            display: block;
        }

        /* 專屬微調：將系統設定面板內的修改和刪除按鈕字體同時變細統一 */
        .system-settings-panel .action-btn.edit,
        .system-settings-panel .action-btn.delete {
            font-size: 9px !important;
            font-weight: bold;
        }

        .settings-section-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 6px;
            margin-top: 10px;
            padding-left: 2px;
        }

        .settings-section-title:first-of-type {
            margin-top: 0;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdfafb;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .settings-add-form {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 12px;
        }

        .settings-add-form input[type="text"] {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 12px;
        }

        .settings-add-form input[type="color"] {
            border: none;
            width: 28px;
            height: 28px;
            padding: 0;
            background: none;
            cursor: pointer;
        }

        /* 自訂正方形小Icon上傳按鈕外框 */
        .custom-icon-upload-wrapper {
            border: 1px dashed var(--primary-color);
            width: 28px;
            height: 28px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #fff;
            overflow: hidden;
            position: relative;
        }

        .custom-icon-upload-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .custom-icon-upload-wrapper span {
            font-size: 12px;
        }

        .settings-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 系統設定中 IP 與平台 Icon 的清除按鈕 */
        .icon-clear-btn {
            font-size: 10px;
            font-weight: bold;
            color: #e24a4a;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
            display: none;
        }

        /* Dual-row Filters */
        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .filter-row-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .filter-row {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            flex: 1;
        }

        .filter-row::-webkit-scrollbar {
            display: none;
        }

        .filter-row-label {
            font-size: 10px;
            color: var(--text-light);
            font-weight: bold;
            margin-bottom: 2px;
            padding-left: 4px;
        }

        .filter-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Sorting Select Styling */
        .sort-select {
            background: var(--primary-light);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            outline: none;
            margin-bottom: 4px;
            margin-left: 8px;
            -webkit-appearance: none;
            appearance: none;
            text-align: center;
        }

        .sort-btn:active {
            transform: scale(0.95);
        }

        /* Card List */
        .goods-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .goods-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .goods-card.card-completed {
            background-color: #f1f1f1 !important;
            border-color: #e0e0e0;
        }

        .goods-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ip-badges-wrapper {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .ip-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(0,0,0,0.05);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Card 內自訂小正方形圖片圖標樣式 */
        .square-badge-icon {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.4);
            display: inline-block;
        }

        /* 卡片平台標籤樣式 */
        .platform-tag {
            background: #e9ecef;
            color: #495057;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .platform-tag-icon {
            width: 13px;
            height: 13px;
            border-radius: 2px;
            object-fit: cover;
            display: inline-block;
        }

        .status-select-btn {
            border: none;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .status-select-btn:active {
            transform: scale(0.95);
        }

        .status-pending {
            background-color: #f1f3f5;
            color: #495057;
        }

        .status-shipped {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-arrived {
            background-color: #d4edda;
            color: #155724;
        }

        .status-completed {
            background-color: #5c5556;
            color: #ffffff;
        }

        .goods-body {
            display: flex;
            gap: 12px;
        }

        .goods-pic {
            width: 130px;
            height: 100px;
            background: #fdf6f7;
            border: 1px dashed #e0ccd0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .goods-pic img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .goods-pic span {
            font-size: 10px;
            color: var(--text-light);
            text-align: center;
            padding: 4px;
        }

        .goods-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .goods-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .goods-meta {
            font-size: 11px;
            color: var(--text-light);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .meta-item {
            background: #f7f3f4;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .goods-financials {
            display: flex;
            flex-direction: column;
            gap: 4px;
            border-top: 1px solid #fcf6f7;
            padding-top: 8px;
            margin-top: 4px;
            font-size: 12px;
        }

        .financial-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-tag {
            color: var(--primary-color);
            font-weight: bold;
        }

        .balance-tag {
            color: #e56b3f;
            font-weight: bold;
        }

        .total-cost-tag {
            color: #55a630;
            font-weight: bold;
        }

        .remarks-section {
            font-size: 11px;
            color: #7a6a6d;
            background: #fff9fa;
            padding: 6px 8px;
            border-radius: 6px;
            border-left: 3px solid var(--primary-color);
            margin-top: 2px;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            border-top: 1px solid var(--border-color);
            padding-top: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .action-btn.edit {
            color: #4a90e2;
        }

        .action-btn.delete {
            color: #e24a4a;
        }

        /* Fixed Bottom Action Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -3px 12px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 64px;
            z-index: 9999;
            padding: 0 30px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 12px rgba(216, 92, 128, 0.45);
            transform: translateY(-12px);
        }

        /* Lightbox Preview */
        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .lightbox-overlay.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            object-fit: contain;
        }

        /* Modal styling */
        /* 修改 Modal 遮罩層 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            align-items: flex-end;
            /* 阻止遮罩層本身的觸控穿透 */
            touch-action: none; 
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            background: white;
            width: 100%;
            /* 💡 重點改動 1：高度改為自動適應，不再強制壓扁 */
            height: auto; 
            /* 💡 重點改動 2：最大高度限制為螢幕的 90%，防止撐出螢幕外 */
            max-height: 95dvh; 
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            /* 💡 底部 padding 設為 40px，確保儲存按鈕下方有足夠的留白 */
            padding: 16px 20px 40px 20px; 
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 1. 將原本 fixed 底欄的設定改成普通按鈕排版 */
        .modal-content .submit-btn {
            position: relative; /* ⬅️ 取消原本的 fixed，讓按鈕跟隨在備註下面 */
            margin-top: 0px;   /* 與備註欄留點空隙 */
            border-radius: 8px; /* 變回好看的圓角按鈕 */
            font-size: 15px;
            padding: 12px;
            width: 100%;
        }

        /* 鎖定底層網頁捲動嘅 Class */
        body.modal-open {
            overflow: hidden !important;
            position: fixed !important; /* 💡 強制鎖死 Safari 網頁底層 */
            width: 100% !important;
            height: 100% !important;
        }

        .modal-title {
            font-size: 16px;
            font-weight: bold;
            margin-top: 4px;
            margin-bottom: 16px;
            color: var(--text-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px;
        }

        .form-group {
            margin-bottom: 12px;
            min-width: 0;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .form-control {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
        }

        input.form-control, select.form-control {
            height: 36px;
            line-height: 20px;
            padding: 6px 10px;
        }

        input[type="date"].form-control {
          width: 100%; /* 💡 讓它自動 100% 填滿左邊的格子，與右邊對稱 */
          max-height: 36px !important;
          text-align: center;
          display: block;
          -webkit-appearance: none;
          appearance: none;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
            min-width: 0;
        }

        .dropdown-double-row {
            display: flex;
            gap: 6px;
        }

        .dropdown-double-row select {
            flex: 1;
            min-width: 0;
        }

        .ip-tags-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .ip-tag-option {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            border: 1px solid transparent;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .ip-tag-option.unselected {
            background: #f1f3f5 !important;
            color: var(--text-color) !important;
            border-color: transparent !important;
        }

        .submit-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
        }

        .upload-container {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }

        .upload-preview {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #f1f3f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .upload-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            flex: 1;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-btn-styled {
            border: 1px dashed var(--primary-color);
            color: var(--primary-color);
            background-color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            display: block;
        }

        .financial-row-form {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .financial-row-form .form-group {
            flex: 1;
            min-width: 0;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <header id="main-header">🍡 谷子手帳 Goods Tracker</header>

    <div class="container">
        <div class="summary-card">
            <div class="stat-item highlight-stat">
                <div class="label">即將到貨 📦</div>
                <div class="value" id="imminent-count">0</div>
            </div>
            <div class="stat-item">
                <div class="label">未收貨件 ⌛</div>
                <div class="value" id="pending-count">0</div>
            </div>
            <div class="stat-item">
                <div class="label">尾款 💸</div>
                <div class="value" id="total-balance">¥0</div>
            </div>
        </div>

        <div class="rate-setting" id="rate-setting-wrapper">

    <script>
        const defaultIpSettings = [
            { id: "IP1", name: "IP1", color: "#ffe3e8", textColor: "#d85c80", pic: "" },
            { id: "IP2", name: "IP2", color: "#e3f0ff", textColor: "#3b7ec4", pic: "" },
            { id: "IP3", name: "IP3", color: "#fef1cf", textColor: "#9e7715", pic: "" },
            { id: "OTHERS", name: "其他", color: "#ecebeb", textColor: "#5c5556", pic: "" }
        ];

        const defaultPlatformSettings = [
            { id: "淘寶", name: "淘寶", pic: "" },
            { id: "閒魚", name: "閒魚", pic: "" },
            { id: "小紅書", name: "小紅書", pic: "" },
            { id: "官網", name: "官網", pic: "" },
            { id: "拼團", name: "拼團", pic: "" },
            { id: "其他", name: "其他", pic: "" }
        ];

        const defaultData = [
            { item: "Item 1", ip: ["IP1"], status: "待出貨", date: "2026-06-01", arrived: "2026年7月", paid: 100, currency: "HKD", balance: 180, fullpaid: false, platform: "小紅書", pic: "", remarks: "" }
        ];

        let goodsList;
        let globalRate;
        let ipSettings;
        let platformSettings;
        let headerTitle;
        let currentSortMode;
        try {
            goodsList = JSON.parse(localStorage.getItem('goodsTrackerData')) || defaultData;
            globalRate = parseFloat(localStorage.getItem('goodsTrackerRate')) || 1.16;
            ipSettings = JSON.parse(localStorage.getItem('goodsTrackerIpSettings')) || defaultIpSettings;
            
            let savedPlats = localStorage.getItem('goodsTrackerPlatformSettings');
            if (savedPlats) {
                let parsed = JSON.parse(savedPlats);
                if (parsed.length > 0 && typeof parsed[0] === 'string') {
                    platformSettings = parsed.map(p => ({ id: p, name: p, pic: "" }));
                } else {
                    platformSettings = parsed;
                }
            } else {
                platformSettings = defaultPlatformSettings;
            }

            headerTitle = localStorage.getItem('goodsTrackerHeaderTitle') || "🍡 谷子手帳 Goods Tracker";
            currentSortMode = localStorage.getItem('goodsTrackerSortMode') || 'arrived_desc'; 
        } catch (e) {
            goodsList = defaultData; globalRate = 1.16; ipSettings = defaultIpSettings; platformSettings = defaultPlatformSettings; headerTitle = "🍡 谷子手帳 Goods Tracker"; currentSortMode = 'arrived_desc';
        }

        goodsList.forEach(item => {
            if (item.status === '已出貨') item.status = '出貨';
            if (item.status === '已到貨') item.status = '到貨';
            if (typeof item.ip === 'string') item.ip = [item.ip];
            if (!item.ip) item.ip = ["OTHERS"];
        });

        let selectedFormIPs = [];
        let currentStatusFilter = 'ongoing';
        let currentIPFilter = 'all';

        document.getElementById('global-rate').value = globalRate.toFixed(2);

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('main-header').innerText = headerTitle;
            document.getElementById('custom-header-title').value = headerTitle;

            const sortSelect = document.getElementById('sort-select');
            if (sortSelect) sortSelect.value = currentSortMode;

            renderFilters();
            renderSettingsManager();
            render();
        });

        function updateGlobalRate() {
            const inputVal = parseFloat(document.getElementById('global-rate').value);
            if (!isNaN(inputVal) && inputVal > 0) {
                globalRate = inputVal;
                try { localStorage.setItem('goodsTrackerRate', globalRate); } catch(e){}
                calculateConvertedPrice(); render();
            }
        }

        function updateHeaderTitle() {
            const newTitle = document.getElementById('custom-header-title').value.trim();
            if (!newTitle) return alert('請輸入手帳標題！');
            headerTitle = newTitle;
            document.getElementById('main-header').innerText = headerTitle;
            try { localStorage.setItem('goodsTrackerHeaderTitle', headerTitle); alert('手帳標題已成功儲存！'); } catch(e){}
        }

        function toggleSystemSettings() {
            const panel = document.getElementById('system-settings-panel');
            const rateContainer = document.getElementById('rate-container');
            const rateWrapper = document.getElementById('rate-setting-wrapper');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                rateContainer.classList.add('hide-rate');
                rateWrapper.classList.add('settings-active');
            } else {
                rateContainer.classList.remove('hide-rate');
                rateWrapper.classList.remove('settings-active');
            }
        }

        function getContrastYIQ(hexcolor){
            hexcolor = hexcolor.replace("#", "");
            var r = parseInt(hexcolor.substr(0,2),16), g = parseInt(hexcolor.substr(2,2),16), b = parseInt(hexcolor.substr(4,2),16);
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? '#4a3e41' : '#ffffff';
        }

        /* --- 新增：萬能 Base64 畫布自動縮小壓縮函數 --- */
        function compressImage(base64Str, maxWidth = 500, quality = 0.7) {
            return new Promise((resolve) => {
                // 如果不是 Base64 格式，直接返回
                if (!base64Str || !base64Str.startsWith('data:image')) {
                    resolve(base64Str);
                    return;
                }
                const img = new Image();
                img.onload = function() {
                    let width = img.width;
                    let height = img.height;
                    
                    // 如果圖片已經很小，只做格式轉化與畫質輕量壓縮，防止尺寸放大
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 導出為高壓縮率的 JPEG 格式，極大縮減體積
                    const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                    resolve(compressedBase64);
                };
                img.onerror = function() {
                    resolve(base64Str); // 若加載出錯，返回原圖避開崩潰
                };
                img.src = base64Str;
            });
        }

        /* --- IP Icon 處理 --- */
        function handleIpIconUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                // 自動將 IP 頭貼進行超小規格壓縮 (最大寬度 100px)
                compressImage(e.target.result, 100, 0.7).then(compressed => {
                    document.getElementById('new-ip-pic').value = compressed;
                    document.getElementById('new-ip-icon-preview').src = compressed;
                    document.getElementById('new-ip-icon-preview').style.display = 'block';
                    document.getElementById('new-ip-icon-placeholder').style.display = 'none';
                    document.getElementById('ip-icon-clear-btn').style.display = 'inline-block';
                });
            };
            reader.readAsDataURL(file);
        }

        function clearIpIconUpload() {
            document.getElementById('new-ip-pic').value = '';
            document.getElementById('new-ip-file').value = '';
            document.getElementById('new-ip-icon-preview').style.display = 'none';
            document.getElementById('new-ip-icon-placeholder').style.display = 'block';
            document.getElementById('ip-icon-clear-btn').style.display = 'none';
        }

        /* --- Platform Icon 處理 --- */
        function handlePlatformIconUpload(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                // 自動將平台 Logo 進行超小規格壓縮 (最大寬度 100px)
                compressImage(e.target.result, 100, 0.7).then(compressed => {
                    document.getElementById('new-platform-pic').value = compressed;
                    document.getElementById('new-platform-icon-preview').src = compressed;
                    document.getElementById('new-platform-icon-preview').style.display = 'block';
                    document.getElementById('new-platform-icon-placeholder').style.display = 'none';
                    document.getElementById('platform-icon-clear-btn').style.display = 'inline-block';
                });
            };
            reader.readAsDataURL(file);
        }

        function clearPlatformIconUpload() {
            document.getElementById('new-platform-pic').value = '';
            document.getElementById('new-platform-file').value = '';
            document.getElementById('new-platform-icon-preview').style.display = 'none';
            document.getElementById('new-platform-icon-placeholder').style.display = 'block';
            document.getElementById('platform-icon-clear-btn').style.display = 'none';
        }

        function renderSettingsManager() {
            // IP 清單渲染
            const ipContainer = document.getElementById('ip-manager-list'); ipContainer.innerHTML = '';
            ipSettings.forEach(ip => {
                const iconTag = ip.pic ? `<img src="${ip.pic}" class="square-badge-icon">` : '';
                ipContainer.innerHTML += `
                    <div class="settings-item">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <span class="ip-badge" style="background-color: ${ip.color}; color: ${ip.textColor || getContrastYIQ(ip.color)};">${iconTag}${ip.name || '(純Icon)'}</span>
                            <input type="color" value="${ip.color}" onchange="updateIpColor('${ip.id}', this.value)" style="border:none; width:22px; height:22px; cursor:pointer; background:none;">
                        </div>
                        <div>
                            <button class="action-btn edit" onclick="startEditIp('${ip.id}')" style="padding: 2px 4px; font-size:11px;">修改</button>
                            ${ip.id !== 'OTHERS' ? `<button class="action-btn delete" onclick="deleteIp('${ip.id}')" style="padding: 2px 4px; font-size:11px;">刪除</button>` : ''}
                        </div>
                    </div>`;
            });

            // 平台清單渲染
            const platformContainer = document.getElementById('platform-manager-list'); platformContainer.innerHTML = '';
            platformSettings.forEach(plat => {
                const iconTag = plat.pic ? `<img src="${plat.pic}" class="platform-tag-icon">` : '🛒 ';
                platformContainer.innerHTML += `
                    <div class="settings-item">
                        <span style="font-size:12px; font-weight:bold; display:inline-flex; align-items:center; gap:4px;">${iconTag}${plat.name || '(純Icon平台)'}</span>
                        <div>
                            <button class="action-btn edit" onclick="startEditPlatform('${plat.id}')" style="padding: 2px 4px; font-size:11px;">修改</button>
                            ${plat.id !== '其他' ? `<button class="action-btn delete" onclick="deletePlatform('${plat.id}')" style="padding: 2px 4px; font-size:11px;">刪除</button>` : ''}
                        </div>
                    </div>`;
            });
        }

                function renderFilters() {
            // 1. 初始化所有計數變量
            let totalOngoing = 0;
            let totalAll = goodsList.length;
            let statusCounts = { '待出貨': 0, '出貨': 0, '到貨': 0, '完成': 0 };
            
            // 2. 初始化 IP 分類的計數（預設全部為 0）
            let ipCounts = {};
            ipSettings.forEach(ip => ipCounts[ip.id] = 0);
            ipCounts['OTHERS'] = 0;

            // 3. 遍歷手帳列表，即時計算狀態同 IP 數量
            goodsList.forEach(item => {
                if (item.status !== '完成') totalOngoing++;
                if (statusCounts.hasOwnProperty(item.status)) statusCounts[item.status]++;
                
                // 💡 核心連動：只有符合當前「狀態過濾」嘅谷子，先會計入 IP 分類數量中
                let matchStatus = currentStatusFilter === 'all' ? true : (currentStatusFilter === 'ongoing' ? item.status !== '完成' : item.status === currentStatusFilter);
                
                if (matchStatus) {
                    const itemIps = Array.isArray(item.ip) ? item.ip : [item.ip || 'OTHERS'];
                    itemIps.forEach(ipId => {
                        if (ipCounts.hasOwnProperty(ipId)) {
                            ipCounts[ipId]++;
                        } else {
                            ipCounts['OTHERS']++;
                        }
                    });
                }
            });

            // 4. 產生並渲染「狀態 Filters」按鈕（帶計數）
            const statusContainer = document.getElementById('status-filters');
            statusContainer.innerHTML = `
                <button class="filter-btn ${currentStatusFilter === 'ongoing' ? 'active' : ''}" onclick="filterStatus('ongoing', event)">進行中 (${totalOngoing})</button>
                <button class="filter-btn ${currentStatusFilter === 'all' ? 'active' : ''}" onclick="filterStatus('all', event)">全部 (${totalAll})</button>
                <button class="filter-btn ${currentStatusFilter === '待出貨' ? 'active' : ''}" onclick="filterStatus('待出貨', event)">待出貨 (${statusCounts['待出貨']})</button>
                <button class="filter-btn ${currentStatusFilter === '出貨' ? 'active' : ''}" onclick="filterStatus('出貨', event)">出貨 (${statusCounts['出貨']})</button>
                <button class="filter-btn ${currentStatusFilter === '到貨' ? 'active' : ''}" onclick="filterStatus('到貨', event)">到貨 (${statusCounts['到貨']})</button>
                <button class="filter-btn ${currentStatusFilter === '完成' ? 'active' : ''}" onclick="filterStatus('完成', event)">完成 (${statusCounts['完成']})</button>
            `;

            // 5. 產生並渲染「IP 分類 Filters」按鈕
            const filterContainer = document.getElementById('ip-filters');
            
            // 計算當前狀態過濾下的總件數（例如：當前在「進行中」，全部 IP 合共就是 totalOngoing 咁多件）
            let currentStatusTotal = currentStatusFilter === 'all' ? totalAll : (currentStatusFilter === 'ongoing' ? totalOngoing : statusCounts[currentStatusFilter]);
            
            // 首先放「全部」按鈕
            filterContainer.innerHTML = `<button class="filter-btn ${currentIPFilter === 'all' ? 'active' : ''}" onclick="filterIP('all', event)">全部 (${currentStatusTotal})</button>`;
            
            // 遍歷所有 IP 分類，進行智能顯示
            ipSettings.forEach(ip => {
                const count = ipCounts[ip.id] || 0;
                
                // 💡 智能顯示邏輯：
                // 1. 如果該 IP 底下有谷子（count > 0），或者用戶剛好正選中（active）呢個 IP，就顯示出來。

        function parseArrivalDate(str) {
            if (!str) return null;
            let matches = str.match(/\d+/g); if (!matches) return null;
            let year = 2026, month = 1;
            if (matches.length === 1) month = parseInt(matches[0]);
            else if (matches.length >= 2) { year = parseInt(matches[0]); if (year < 100) year += 2000; month = parseInt(matches[1]); }
            return new Date(year, month - 1, 1).getTime();
        }

            const balCurrency = document.getElementById('form-balance-currency').value;
            const preview = document.getElementById('conversion-preview');
            let parts = [];
            if (amount > 0) parts.push(currency === 'RMB' ? `已付: ¥${amount} (折合 $${(amount * globalRate).toFixed(2)} HKD)` : `已付: $${amount} HKD`);
            if (balAmount > 0) parts.push(balCurrency === 'RMB' ? `尾款: ¥${balAmount} (折合 $${(balAmount * globalRate).toFixed(2)} HKD)` : `尾款: $${balAmount} HKD`);
            preview.innerHTML = parts.length > 0 ? `💡 預覽折算：` + parts.join(' | ') : '';

        function calculateStats() {
            let imminent = 0, pending = 0, balTotalRMB = 0;
            const now = new Date(); const currentTimestamp = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            goodsList.forEach(item => {
                if (item.status !== '完成') { pending++; let arrTime = parseArrivalDate(item.arrived); if (arrTime !== null && arrTime <= currentTimestamp) imminent++; }
                const balInRMB = (item.balanceCurrency || 'RMB') === 'RMB' ? Number(item.balance || 0) : (Number(item.balance || 0) / globalRate);
                balTotalRMB += balInRMB;
            });
            document.getElementById('imminent-count').innerText = imminent + " 件";
            document.getElementById('pending-count').innerText = pending + " 件";
            document.getElementById('total-balance').innerText = `¥${balTotalRMB}`;
        }

                function render() {
            // ================= 1. 即時重新計算所有計數 (Filters Count) =================
            let totalOngoing = 0;

            let ipCounts = {};
            ipSettings.forEach(ip => ipCounts[ip.id] = 0);
            ipCounts['OTHERS'] = 0;

            goodsList.forEach(item => {
                if (item.status !== '完成') totalOngoing++;
                if (statusCounts.hasOwnProperty(item.status)) statusCounts[item.status]++;
                
                // IP 計數連動當前狀態
                let matchStatus = currentStatusFilter === 'all' ? true : (currentStatusFilter === 'ongoing' ? item.status !== '完成' : item.status === currentStatusFilter);
                if (matchStatus) {
                    const itemIps = Array.isArray(item.ip) ? item.ip : [item.ip || 'OTHERS'];
                    itemIps.forEach(ipId => {
                        if (ipCounts.hasOwnProperty(ipId)) ipCounts[ipId]++;
                        else ipCounts['OTHERS']++;

            // ================= 2. 渲染狀態 Filters (0件自動隱藏) =================

            // 其他狀態大於 0 或者正被選中才顯示
            ['待出貨', '出貨', '到貨', '完成'].forEach(st => {

                    statusHTML += `<button class="filter-btn ${currentStatusFilter === st ? 'active' : ''}" onclick="filterStatus('${st}', event)">${st} (${c})</button>`;
                }
            });
            statusContainer.innerHTML = statusHTML;

            // ================= 3. 渲染 IP Filters (0件自動隱藏) =================
            const filterContainer = document.getElementById('ip-filters');

            // ... 你原本 render() 函數底下的所有代碼 (filteredList.filter, sort, forEach 等) ...

                if (item.arrived) {
                    const yM = item.arrived.match(/(\d+)年/), mM = item.arrived.match(/(\d+)月/);
                    if (yM) yVal = yM[1]; if (mM) mVal = mM[1];
                }
                document.getElementById('form-arrived-year').value = yVal; document.getElementById('form-arrived-month').value = mVal;
                document.getElementById('form-paid').value = item.paid; document.getElementById('form-currency').value = item.currency || 'HKD';
                document.getElementById('form-balance').value = item.balance; document.getElementById('form-balance-currency').value = item.balanceCurrency || 'RMB';
                document.getElementById('form-platform').value = platformSettings.some(p => p.id === item.platform) ? item.platform : '其他';
                document.getElementById('form-fullpaid').checked = item.fullpaid; document.getElementById('form-pic').value = item.pic;
                document.getElementById('form-remarks').value = item.remarks;

                if (item.pic) {
                    document.getElementById('pic-preview').innerHTML = (item.pic.startsWith('http') || item.pic.startsWith('data:image')) ? `<img src="${item.pic}">` : `<span>${item.pic}</span>`;
                }
                calculateConvertedPrice();
            } else {
                // ... 你原本的 add 帶入邏輯 ...
                document.getElementById('modal-action-title').innerText = '新增谷子記錄'; document.getElementById('edit-index').value = '';
                selectedFormIPs = ipSettings.length > 0 ? [ipSettings[0].id] : ['OTHERS']; updateFormIPClasses();
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
                document.getElementById('form-currency').value = 'HKD'; document.getElementById('form-balance-currency').value = 'RMB';
                document.getElementById('form-arrived-year').value = new Date().getFullYear(); document.getElementById('form-arrived-month').value = '';
                if (platformSettings.length > 0) document.getElementById('form-platform').value = platformSettings[0].id;
            }

            // 💡 關鍵鎖死底層：記錄當前主頁位置，並鎖定 body 捲動
            scrollPosition = window.pageYOffset;
            document.body.style.top = `-${scrollPosition}px`;
            document.body.classList.add('modal-open');

            modal.classList.add('active'); 
        }

        function closeModal() { 
            const modal = document.getElementById('goods-modal');
            modal.classList.remove('active'); 

            // 💡 關鍵解鎖底層：恢復 body 捲動，並跳回原本的捲動位置
            document.body.classList.remove('modal-open');
            document.body.style.top = '';
            window.scrollTo(0, scrollPosition);
        }
        
        function saveGoods(event) {
            event.preventDefault(); const index = document.getElementById('edit-index').value;
            const y = document.getElementById('form-arrived-year').value.trim(), m = document.getElementById('form-arrived-month').value.trim();
            let combined = (y || m) ? `${y ? y + '年' : ''}${m ? m + '月' : ''}` : '';

            const itemData = {
                item: document.getElementById('form-item').value,
                ip: selectedFormIPs.length > 0 ? selectedFormIPs : ['OTHERS'],
                status: document.getElementById('form-status').value,
                date: document.getElementById('form-date').value,
                arrived: combined,
                paid: parseFloat(document.getElementById('form-paid').value) || 0,
                currency: document.getElementById('form-currency').value,
                balance: parseFloat(document.getElementById('form-balance').value) || 0,
                balanceCurrency: document.getElementById('form-balance-currency').value,
                platform: document.getElementById('form-platform').value,
                fullpaid: document.getElementById('form-fullpaid').checked,
                pic: document.getElementById('form-pic').value,
                remarks: document.getElementById('form-remarks').value
            };

            if (index !== '') goodsList[index] = itemData; else goodsList.push(itemData);
            saveData(); closeModal(); window.location.reload();
        }

        function duplicateGoods(index) { const dup = JSON.parse(JSON.stringify(goodsList[index])); dup.item += " (Copy)"; goodsList.splice(index + 1, 0, dup); saveData(); }
        function editGoods(index) { openModal('edit', index); }
        function deleteGoods(index) { if (confirm('確定要刪除這個記錄嗎？')) { goodsList.splice(index, 1); saveData(); } }

        function exportData() {
            try {
                const jsonString = JSON.stringify({ goodsList, globalRate, ipSettings, platformSettings, headerTitle }, null, 2);
                const blob = new Blob([jsonString], { type: "application/json;charset=utf-8" });
                const url = URL.createObjectURL(blob); const a = document.createElement('a');
                a.href = url; a.download = `goodsbackup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            } catch (err) { alert('備份失敗：' + err.message); }
        }

        /* --- 修改：導入備份時，自動啟動「異步全相片壓縮功能」 --- */
        function importData() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0], reader = new FileReader();
                reader.onload = re => {
                    try {
                        const parsed = JSON.parse(re.target.result);
                        let incomingList = parsed.goodsList || (Array.isArray(parsed) ? parsed : []);
                        if (incomingList.length === 0) return alert('格式錯誤，請上傳有效的備份 JSON 檔案。');

                        incomingList.forEach(item => {
                            if (item.status === '已出貨') item.status = '出貨';
                            if (item.status === '已到貨') item.status = '到貨';
                            if (typeof item.ip === 'string') item.ip = [item.ip];
                            if (!item.ip) item.ip = ["OTHERS"];
                        });

                        let incomingPlatformSettings = [];
                        if (parsed.platformSettings) {
                            if (parsed.platformSettings.length > 0 && typeof parsed.platformSettings[0] === 'string') {
                                incomingPlatformSettings = parsed.platformSettings.map(p => ({ id: p, name: p, pic: "" }));
                            } else {
                                incomingPlatformSettings = parsed.platformSettings;
                            }
                        }

                        let incomingIpSettings = parsed.ipSettings || [];
                        incomingIpSettings.forEach(ip => {
                            if (!ip.hasOwnProperty('pic')) ip.pic = "";
                        });

                        const overwrite = !confirm('發現手帳記錄！\n\n【確定】將備份與現有記錄「合併」\n【取消】將備份「完全覆蓋」現有紀錄');

                        // 💡 核心優化：開啟進度提示，異步批量壓縮導入檔案內的所有大型相片！
                        const compressTasks = [];
                        
                        // 1. 壓縮物品相片
                        incomingList.forEach(item => {
                            if (item.pic && item.pic.startsWith('data:image')) {
                                const task = compressImage(item.pic, 500, 0.7).then(compressed => {
                                    item.pic = compressed;
                                });
                                compressTasks.push(task);
                            }
                        });

                        // 2. 壓縮 IP 分類頭貼
                        incomingIpSettings.forEach(ip => {
                            if (ip.pic && ip.pic.startsWith('data:image')) {
                                const task = compressImage(ip.pic, 100, 0.7).then(compressed => {
                                    ip.pic = compressed;
                                });
                                compressTasks.push(task);
                            }
                        });

                        // 3. 壓縮平台圖標
                        incomingPlatformSettings.forEach(plat => {
                            if (plat.pic && plat.pic.startsWith('data:image')) {
                                const task = compressImage(plat.pic, 100, 0.7).then(compressed => {
                                    plat.pic = compressed;
                                });
                                compressTasks.push(task);
                            }
                        });

                        // 等待所有相片縮小壓縮完成後，再行寫入 LocalStorage
                        Promise.all(compressTasks).then(() => {
                            if (overwrite) {
                                goodsList = incomingList;
                                if (parsed.globalRate) { 
                                    globalRate = parseFloat(parsed.globalRate); 
                                    localStorage.setItem('goodsTrackerRate', globalRate); 
                                }
                                if (parsed.ipSettings) { 
                                    ipSettings = incomingIpSettings; 
                                    localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings)); 
                                }
                                if (incomingPlatformSettings.length > 0) { 
                                    platformSettings = incomingPlatformSettings; 
                                    localStorage.setItem('goodsTrackerPlatformSettings', JSON.stringify(platformSettings)); 
                                }
                                if (parsed.headerTitle) { 
                                    headerTitle = parsed.headerTitle; 
                                    localStorage.setItem('goodsTrackerHeaderTitle', headerTitle); 
                                }
                            } else {
                                incomingList.forEach(inc => { 
                                    if (!goodsList.some(ex => ex.item === inc.item && ex.date === inc.date && ex.paid === inc.paid)) {
                                        goodsList.push(inc); 
                                    }
                                });
                                if (parsed.ipSettings) {
                                    incomingIpSettings.forEach(incIp => { 
                                        if (!ipSettings.some(ex => ex.id === incIp.id)) {
                                            ipSettings.push(incIp); 
                                        } else {
                                            let existing = ipSettings.find(ex => ex.id === incIp.id);
                                            if (existing && !existing.pic && incIp.pic) existing.pic = incIp.pic;
                                        }
                                    });
                                    localStorage.setItem('goodsTrackerIpSettings', JSON.stringify(ipSettings));
                                }
                                if (incomingPlatformSettings.length > 0) {
                                    incomingPlatformSettings.forEach(incP => { 
                                        if (!platformSettings.some(ex => ex.id === incP.id)) {
                                            platformSettings.push(incP); 
                                        } else {
                                            let existing = platformSettings.find(ex => ex.id === incP.id);
                                            if (existing && !existing.pic && incP.pic) existing.pic = incP.pic;
                                        }
                                    });
                                    localStorage.setItem('goodsTrackerPlatformSettings', JSON.stringify(platformSettings));
                                }
                            }
                            
                            // 儲存壓縮後的乾淨小數據，並重新整理
                            saveData(); 
                            window.location.reload();
                        });

                    } catch (err) { 
                        alert('導入失敗：' + err.message); 
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetToDefaultSystem() {
            if (confirm('🚨 警告：確定要還原手帳嗎？\n\n這將會徹底刪除手帳上現有的所有谷子記錄、自訂IP分類、自訂平台Logo以及你之前導入過的任何JSON備份！此操作無法復原。')) {
                if (confirm('🔥 最後確認：你真的要清除所有數據嗎？\n（建議清除前先在主頁底部進行「💾 備份」下載備份檔案以防萬一）')) {
                    try {
                        localStorage.removeItem('goodsTrackerData');
                        localStorage.removeItem('goodsTrackerRate');
                        localStorage.removeItem('goodsTrackerIpSettings');
                        localStorage.removeItem('goodsTrackerPlatformSettings');
                        localStorage.removeItem('goodsTrackerHeaderTitle');
                        localStorage.removeItem('goodsTrackerSortMode');
                        
                        alert('✨ 系統已成功還原！手帳即將自動重新整理回復初始狀態。');
                        window.location.reload(); 
                    } catch(e) {
                        alert('還原失敗：' + e.message);
                    }
                }
            }
        }

        // 💡 智能檢測：如果用戶係用 Web App (Standalone Mode) 打開
        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            // 專屬為 Web App 加入鎖死回彈的 CSS
            const style = document.createElement('style');
            style.innerHTML = 'html, body { overscroll-behavior-y: none !important; }';
            document.head.appendChild(style);
        }
        
    </script>
</body>
